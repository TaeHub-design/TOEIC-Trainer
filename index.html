// ============================================================

//  - "standalone" mode: file is a regular .html opened in a browser

const IS_ARTIFACT = typeof window !== "undefined" && !!window.storage;

// Unified async storage adapter. Both branches return Promises so the
// rest of the app can `await` consistently regardless of environment.
const STORAGE = IS_ARTIFACT
  ? {
      async get(k) { try { const r = await window.storage.get(k); return r && r.value != null ? r.value : null; } catch (e) { return null; } },
      async set(k, v) { try { await window.storage.set(k, v); return true; } catch (e) { return false; } },
    }
  : {
      async get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
      async set(k, v) { try { localStorage.setItem(k, v); return true; } catch (e) { return false; } },
    };

// ---- Spaced repetition (SRS) ----
// Each rated item gets a "due" date. When due arrives, it surfaces for review.
// forgot → soon, sort → a few days, known → a week (and doubles each time it stays known).
const DAY_MS = 86400000;
function nextSrs(prev, status, now) {
  let interval;
  if (status === "forgot") interval = 1;
  else if (status === "sort") interval = 3;
  else { const p = prev && prev.interval ? prev.interval : 0; interval = p >= 7 ? Math.min(p * 2, 30) : 7; }
  return { due: now + interval * DAY_MS, interval, last: now };
}
// an item is "due" if it's rated but has no schedule yet (legacy) OR its due time has passed
function isDue(entry, now) { return !entry || (entry.due || 0) <= now; }
function todayStr(d) { const t = d ? new Date(d) : new Date(); return t.getFullYear() + "-" + String(t.getMonth() + 1).padStart(2, "0") + "-" + String(t.getDate()).padStart(2, "0"); }

// ============================================================
//  AI ENGINE REGISTRY
//  Each engine is self-contained: its models, recommended picks,
//  where its API key lives, the help text for getting a key, and
//  a call() that does the fetch + DETAILED error handling and
//  returns the raw text. Add a new provider by adding one entry.
// ============================================================
const ENGINES = {
  gemini: {
    id: "gemini",
    name: "Gemini",
    icon: "⚡",
    color: "#1a73e8",
    keyStorage: "toeic_gemini_key_v1",
    keyPrefix: "AIza…",
    keyUrl: "https://aistudio.google.com/app/apikey",
    keyUrlLabel: "aistudio.google.com/app/apikey",
    keyLogin: "ล็อกอินด้วยบัญชี Google",
    keyCreate: 'กด "Create API key" แล้วก๊อปคีย์มา',
    models: [
      { id: "flash25", label: "Flash 2.5", str: "gemini-2.5-flash", note: "สมดุล", supportsThinking: false },
      { id: "pro25", label: "Pro 2.5", str: "gemini-2.5-pro", note: "ฉลาดสุด", supportsThinking: false },
      { id: "flashlite25", label: "Flash-Lite 2.5", str: "gemini-2.5-flash-lite", note: "เร็ว/เบา", supportsThinking: false },
    ],
    recommended: { vocab: "flashlite25", grammar: "flash25", listening: "flash25", audio: "flash25" },

        res = await fetch(url, {
          method: "POST",

            contents: [{ role: "user", parts: [{ text: prompt }] }],
            generationConfig: { maxOutputTokens: maxTokens, temperature: 0.8, responseMimeType: "application/json" },

        });
      } catch (netErr) {
        throw new Error("เชื่อมต่อ Gemini ไม่ได้ [network] (" + (netErr && netErr.message ? netErr.message : "fetch failed") + ") — ตรวจสัญญาณเน็ตแล้วลองใหม่");
      }
      if (!res.ok) {
        let body = ""; try { body = await res.text(); } catch (e) {}
        let hint = "";
        if (res.status === 400) hint = " (key อาจไม่ถูกต้อง หรือคำสั่งผิดรูปแบบ)";
        else if (res.status === 401 || res.status === 403) hint = " (API key ไม่ถูกต้อง/ยังไม่เปิดใช้ — เช็กที่ Google AI Studio)";
        else if (res.status === 429) hint = " (เรียกถี่เกินโควต้า รอสักพักแล้วลองใหม่)";
        else if (res.status >= 500) hint = " (ฝั่ง Google ขัดข้องชั่วคราว ลองใหม่ใน 1-2 นาที)";
        throw new Error("Gemini ตอบสถานะ " + res.status + hint + (body ? (": " + body.slice(0, 300)) : ""));
      }
      let data; try { data = await res.json(); } catch (e) { throw new Error("อ่านคำตอบ Gemini ไม่ได้ (ไม่ใช่ JSON)"); }
      if (data && data.error) throw new Error("Gemini error: " + ((data.error.message || JSON.stringify(data.error)) + "").slice(0, 300));
      const cand = (data.candidates && data.candidates[0]) || null;
      if (!cand) throw new Error("Gemini ไม่ส่ง candidate กลับมา — raw: " + JSON.stringify(data).slice(0, 200));
      if (cand.finishReason && cand.finishReason !== "STOP" && cand.finishReason !== "MAX_TOKENS") {
        throw new Error("Gemini หยุดผิดปกติ (finishReason=" + cand.finishReason + ") — อาจโดน safety filter หรือ quota");

      const parts = (cand.content && cand.content.parts) || [];
      return parts.map(p => p && p.text ? p.text : "").join("");

  claude: {
    id: "claude",
    name: "Claude",
    icon: "🧠",
    color: "#c15f3c",

        else if (res.status === 403) hint = " (key ไม่มีสิทธิ์ใช้โมเดลนี้)";
        else if (res.status === 429) hint = " (เรียกถี่เกินโควต้า/เครดิตหมด รอสักพักหรือเติมเครดิต)";
        else if (res.status >= 500) hint = " (ฝั่ง Anthropic ขัดข้องชั่วคราว ลองใหม่ใน 1-2 นาที)";
        throw new Error("Claude ตอบสถานะ " + res.status + hint + (body ? (": " + body.slice(0, 300)) : ""));
      }
      let data; try { data = await res.json(); } catch (e) { throw new Error("อ่านคำตอบ Claude ไม่ได้ (ไม่ใช่ JSON)"); }
      if (data && data.type === "error") throw new Error("Claude error: " + ((data.error && data.error.message ? data.error.message : JSON.stringify(data.error)) + "").slice(0, 300));
      // When adaptive thinking is on, content can include "thinking" / "redacted_thinking" blocks alongside "text" blocks.
      // We only want the final user-facing text — explicitly filter by type.
      return (data.content || [])

  },

      return (data.content || [])
        .filter(b => b && b.type === "text" && typeof b.text === "string")

};

// ---- Text-to-speech (pronunciation) ----
// Uses the browser's built-in speechSynthesis — free, no network. Hidden if unsupported.
const TTS_OK = typeof window !== "undefined" && typeof window.speechSynthesis !== "undefined";
function speak(text, ev) {
  if (ev && ev.stopPropagation) ev.stopPropagation(); // don't trigger card flip / parent click
  try {
    const synth = window.speechSynthesis;
    if (!synth || !text) return;
    synth.cancel(); // stop anything already playing
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = "en-US"; u.rate = 0.92; u.pitch = 1;
    synth.speak(u);
  } catch (e) { /* speech not available */ }
}

const DEFAULT_DIFFICULTY = "nearnative";
function diffById(id) { return DIFFICULTIES.find(d => d.id === id) || DIFFICULTIES[DIFFICULTIES.length - 1]; }
// Normalize a quiz ptype into a real TOEIC part label for session logging, or null.
// Review rounds use Thai labels ("ถึงกำหนดทบทวน" / "ทวนข้อที่ยังไม่แม่น") and mix parts,
// so we don't tag those with a single part.
function realPart(ptype) { return /^Part \d/.test(ptype || "") ? (ptype.match(/^Part \d/) || [])[0] : null; }


// Load pako (gzip) from CDN once; resolve to the lib or null if unavailable.
let _pakoPromise = null;
function loadPako() {
  if (typeof window !== "undefined" && window.pako) return Promise.resolve(window.pako);
  if (_pakoPromise) return _pakoPromise;
  _pakoPromise = new Promise((resolve) => {
    try {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js";
      s.onload = () => resolve(window.pako || null);
      s.onerror = () => resolve(null);
      document.head.appendChild(s);
    } catch (e) { resolve(null); }
  });
  return _pakoPromise;
}
// bytes -> base64 (chunked to avoid call-stack limits on big arrays)
function bytesToB64(bytes) {
  let bin = "";
  const CH = 0x8000;
  for (let i = 0; i < bytes.length; i += CH) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
  }
  return btoa(bin);
}
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
// --- backup integrity: a tiny deterministic checksum so a damaged file/string is
//     DETECTED on import instead of failing silently or loading partial data ---
function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  return (h >>> 0).toString(16).padStart(8, "0");
}
// build the SAME canonical string at export-time and import-time, independent of JSON
// key order, so the checksum verifies the actual data payload (not formatting).
function canonicalBackup(obj) {
  const v = obj.vocab || {}, g = obj.grammar || {}, l = obj.listening || {};
  return JSON.stringify([
    obj.day,
    v.words, v.ratings, v.genCount, v.missQ,
    g.items, g.ratings, g.genCount,
    l.lessons, l.ratings, l.genCount, l.missQ,
  ]);
}

// compress a JSON string -> "TZv1:<base64>"; falls back to raw JSON if pako missing
async function compressBackup(jsonStr) {
  const pako = await loadPako();
  if (!pako) return jsonStr; // graceful fallback: plain JSON (still works on import)
  try {
    const packed = pako.deflate(jsonStr);
    return BACKUP_PREFIX + bytesToB64(packed);
  } catch (e) { return jsonStr; }
}
// accept either a compressed ("TZv1:...") or plain-JSON backup string -> JSON string
async function decompressBackup(text) {
  const t = (text || "").trim();
  if (!t.startsWith(BACKUP_PREFIX)) return t; // old/plain backup
  const pako = await loadPako();
  if (!pako) throw new Error("no-pako");
  const bytes = b64ToBytes(t.slice(BACKUP_PREFIX.length));
  return pako.inflate(bytes, { to: "string" });
}

// ---- per-engine API key helpers (browser storage only — never sent anywhere except the provider) ----
// NB: these are sync wrappers over localStorage when in standalone (key UI is sync). In artifact mode
// the engine doesn't need a key, so getKey/setKey are no-ops for the artifact engine.
async function getStoredEngine() {
  try { const e = await STORAGE.get(ENGINE_KEY); return e && AVAILABLE_ENGINES[e] ? e : DEFAULT_ENGINE; } catch (e) { return DEFAULT_ENGINE; }
}
function setStoredEngine(id) {
  try { if (AVAILABLE_ENGINES[id]) STORAGE.set(ENGINE_KEY, id); } catch (e) {}
}
function getKey(engineId) {
  try {
    const eng = ENGINES[engineId];
    if (!eng || !eng.keyStorage) return ""; // artifact engine has no key
    return (localStorage.getItem(eng.keyStorage) || "").trim();
  } catch (e) { return ""; }
}
function setKey(engineId, k) {
  try {
    const eng = ENGINES[engineId];
    if (!eng || !eng.keyStorage) return;
    localStorage.setItem(eng.keyStorage, (k || "").trim());
  } catch (e) {}
}

// ---- shared AI call: routes to the chosen engine. Returns CLEANED text; throws DETAILED error so the UI shows WHY it failed ----
async function aiComplete({ engineId, model, maxTokens, prompt }) {
  const eng = ENGINES[engineId];
  if (!eng) throw new Error("ไม่รู้จัก engine: " + engineId);
  let key = "";
  if (eng.keyStorage) {
    key = getKey(engineId);
    if (!key) throw new Error("ยังไม่ได้ใส่ " + eng.name + " API key — กดปุ่ม ⚙️ ด้านบนเพื่อใส่ key ก่อนครับ");
  }
  const raw = await eng.call({ model, maxTokens, prompt, key }); // each engine throws its own detailed errors
  const text = (raw || "").replace(/```json/gi, "").replace(/```/g, "").trim();
  if (!text) throw new Error(eng.name + " ไม่ส่งเนื้อหากลับมา (content ว่าง) — ลองกดใหม่อีกครั้ง");
  return text;
}

// Tolerant JSON parser. AI output is occasionally cut off mid-stream when it hits the
// token cap, leaving an unterminated string and unclosed [ { brackets — so JSON.parse
// throws. This first tries a normal parse, then attempts a best-effort repair: walk the
// text tracking string/escape state, drop any trailing partial token, and append the
// closing " ] } needed to balance what we did receive. Returns the parsed value, or
// throws the ORIGINAL error if even the repaired text won't parse.
// LLMs sometimes emit RAW control characters (real newlines/tabs) INSIDE JSON string
// values, which is invalid JSON and makes JSON.parse fail. Escape them so the string
// parses. Only touches characters that appear inside a "..." string — structural
// whitespace between tokens is left alone.
function escapeRawCtrlInStrings(s) {
  let out = "", inStr = false, esc = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    if (inStr) {
      if (esc) { out += c; esc = false; continue; }
      if (c === "\\") { out += c; esc = true; continue; }
      if (c === '"') { out += c; inStr = false; continue; }
      if (c === "\n") { out += "\\n"; continue; }
      if (c === "\r") { out += "\\r"; continue; }
      if (c === "\t") { out += "\\t"; continue; }
      const code = c.charCodeAt(0);
      if (code < 0x20) { out += "\\u" + code.toString(16).padStart(4, "0"); continue; }
      out += c;
    } else {
      if (c === '"') inStr = true;
      out += c;
    }
  }
  return out;
}

// Generation token CEILING (not a charge — you only pay for tokens actually produced).
// Opus can reason/write long, especially inside a Claude artifact, so it needs generous
// room to finish the JSON or the answer gets truncated mid-output. Lighter models need
// less; this also keeps Gemini within sane output limits.
function genMaxTokens(mdl) {
  const s = ((mdl && ((mdl.id || "") + " " + (mdl.str || ""))) || "").toLowerCase();
  if (s.includes("opus")) return 16000;
  if (s.includes("sonnet") || s.includes("pro")) return 8000;
  return 4000; // haiku / flash / flash-lite
}

function parseLooseJson(text) {
  try { return JSON.parse(text); } catch (firstErr) {
    let s = text.trim();
    // strip anything before the first { or [ (stray preamble the model may add)
    const start = s.search(/[\[{]/);
    if (start > 0) s = s.slice(start);
    // escape raw control chars inside strings (common LLM JSON mistake), then retry a clean parse
    s = escapeRawCtrlInStrings(s);
    try { return JSON.parse(s); } catch (e2) {}
    const stack = [];
    let inStr = false, esc = false, lastSafe = -1;
    for (let i = 0; i < s.length; i++) {
      const c = s[i];
      if (inStr) {
        if (esc) esc = false;
        else if (c === "\\") esc = true;
        else if (c === '"') { inStr = false; lastSafe = i; }
      } else {
        if (c === '"') inStr = true;
        else if (c === "{" || c === "[") { stack.push(c); }
        else if (c === "}" || c === "]") { stack.pop(); lastSafe = i; }
        else if (c === "," || (c >= "0" && c <= "9") || c === "t" || c === "f" || c === "n" || c === "}" || c === "]") lastSafe = i;
        else if (!/\s/.test(c)) lastSafe = i;
      }
    }
    // if we ended inside a string, cut back to the last point that closed a token cleanly
    let repaired = inStr && lastSafe >= 0 ? s.slice(0, lastSafe + 1) : s;
    // drop a dangling comma or partial key/value, then close all open brackets
    repaired = repaired.replace(/,\s*$/, "").replace(/:\s*$/, ": null");
    // recompute open brackets on the (possibly trimmed) repaired text
    const open = [];
    let inS = false, es = false;
    for (let i = 0; i < repaired.length; i++) {
      const c = repaired[i];
      if (inS) { if (es) es = false; else if (c === "\\") es = true; else if (c === '"') inS = false; }
      else { if (c === '"') inS = true; else if (c === "{" || c === "[") open.push(c); else if (c === "}" || c === "]") open.pop(); }
    }
    if (inS) repaired += '"'; // close a still-open string
    for (let i = open.length - 1; i >= 0; i--) repaired += open[i] === "{" ? "}" : "]";
    return JSON.parse(repaired); // may throw — caller treats that as a real failure
  }
}

// Fetch + parse with auto-retry. Generation occasionally fails transiently: a network
// blip, an overloaded model, or a response truncated/garbled past what parseLooseJson can
// repair. Rather than make the user hit "create" again, we retry the whole cycle a couple
// of times with a short backoff. `validate(obj)` lets the caller reject a structurally-bad
// parse (e.g. missing questions) so that ALSO triggers a retry instead of a hard failure.
// Throws the last error only after all attempts are exhausted.
async function aiCompleteJson({ engineId, model, maxTokens, prompt, validate, attempts = 3 }) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try {
      const clean = await aiComplete({ engineId, model, maxTokens, prompt });
      const obj = parseLooseJson(clean); // may throw on un-repairable JSON
      if (validate && !validate(obj)) throw new Error("รูปแบบคำตอบไม่ครบ (bad shape)");
      return obj;
    } catch (e) {
      lastErr = e;
      if (i < attempts - 1) await new Promise(r => setTimeout(r, 600 * (i + 1))); // 0.6s, 1.2s backoff
    }
  }
  throw lastErr;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Re-randomise the position of the correct answer for ONE multiple-choice question.
// LLMs tend to pile the correct key on "A" (it mirrors the example shape in the prompt),
// so after parsing we shuffle the option VALUES and remap the answer key. Works for both
// 4-choice items (A/B/C/D — grammar/reading) and 3-choice items (A/B/C — Part 2).
// Returns a NEW question object; leaves the input untouched. Safe to call on any shape:
// if options/answer are missing or malformed, it returns the question unchanged.
function shuffleQuestionOptions(q) {
  if (!q || !q.options || !q.answer) return q;
  const keys = Object.keys(q.options);
  // only handle the canonical letter-keyed shapes
  const expected3 = ["A", "B", "C"];
  const expected4 = ["A", "B", "C", "D"];
  const isLetters =
    (keys.length === 3 && expected3.every(k => keys.includes(k))) ||
    (keys.length === 4 && expected4.every(k => keys.includes(k)));
  if (!isLetters) return q;
  const orderedKeys = keys.length === 3 ? expected3 : expected4;
  if (!orderedKeys.includes(q.answer)) return q; // answer not a valid key → leave as-is
  const correctVal = q.options[q.answer];
  const values = shuffle(orderedKeys.map(k => q.options[k]));
  const newOptions = {};
  let newAnswer = q.answer;
  orderedKeys.forEach((k, i) => {
    newOptions[k] = values[i];
    if (values[i] === correctVal) newAnswer = k;
  });
  return { ...q, options: newOptions, answer: newAnswer };
}

function vocabPrompt(avoidWords, category, diffPrompt) {
  const avoid = avoidWords.length
    ? `\nDo NOT include any of these words the learner already has: ${avoidWords.slice(-150).join(", ")}.`
    : "";
  const diff = diffPrompt ? `\n${diffPrompt}` : "";
  return `You are a TOEIC vocabulary coach for a Thai learner (target 850+).
Generate EXACTLY ${BATCH.vocab} NEW English vocabulary words.
THEME for this batch: "${category}". Choose words that genuinely fit this theme.${diff}
Choose words that match the target difficulty above and that commonly appear on the TOEIC Listening & Reading test.${avoid}
For EACH word provide:
- "w": the word in lowercase
- "pos": part of speech, abbreviated (e.g. "n.", "v.", "adj.", "adv.")
- "ipa": IPA pronunciation in slashes
- "th": the Thai meaning (in Thai script)
- "def": a simple English definition, under 12 words
- "ex": one natural example sentence in a business or daily context
Respond with ONLY a valid minified JSON array of ${BATCH.vocab} objects, no markdown, no backticks, no preamble.
Shape: [{"w":"...","pos":"...","ipa":"...","th":"...","def":"...","ex":"..."}]`;
}

// ---- set ("ชุด") numbering helpers ----
// `gen` tags which generation batch an item belongs to. These derive clean, consistent
// set numbers from the DATA itself, so the count never drifts from what's in the bank.
function topGen(data) { // highest gen present (0 if none)
  let mx = 0;
  for (const x of Object.values(data || {})) { const g = x && typeof x.gen === "number" ? x.gen : 0; if (g > mx) mx = g; }
  return mx;
}
function distinctGenCount(data) { // how many real sets exist (ignores gaps from deduped batches)
  const s = new Set();
  for (const x of Object.values(data || {})) if (x && typeof x.gen === "number" && x.gen > 0) s.add(x.gen);
  return s.size;
}
function genIndexMap(data) { // { rawGen: 1..N } sorted ascending → gapless display numbers
  const gens = [...new Set(Object.values(data || {}).map(x => (x && typeof x.gen === "number") ? x.gen : 0).filter(g => g > 0))].sort((a, b) => a - b);
  const m = {}; gens.forEach((g, i) => { m[g] = i + 1; });
  return m;
}
// merge incoming into existing (existing wins on key clash). NEW incoming entries get their
// gen RE-NUMBERED to continue after the existing max, so a merged backup forms fresh sets
// instead of collapsing onto "ชุด 1". Relative order of incoming sets is preserved.
function mergeRenumberGen(existing, incoming) {
  existing = existing || {}; incoming = incoming || {};
  const base = topGen(existing);
  const newKeys = Object.keys(incoming).filter(k => !(k in existing));
  const gensAsc = [...new Set(newKeys.map(k => (incoming[k] && incoming[k].gen) || 0))].sort((a, b) => a - b);
  const remap = {}; gensAsc.forEach((g, i) => { remap[g] = base + i + 1; });
  const out = { ...existing };
  for (const k of newKeys) { const it = incoming[k]; out[k] = { ...it, gen: remap[(it && it.gen) || 0] || (base + 1) }; }
  return out;
}

function fmtTime(ms) {
  if (ms == null || ms < 0) ms = 0;
  const s = Math.round(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = s % 60;
  return `${mm}:${String(ss).padStart(2, "0")}`;
}

  const MODELS = ENG.models;                              // current engine's selectable models
  const RECOMMENDED = ENG.recommended;                    // current engine's recommended picks
  const models = { ...RECOMMENDED, ...(modelsByEngine[engine] || {}) };   // current engine's chosen models { vocab, grammar, listening }
  // eslint-disable-next-line no-unused-vars
  const _keyDep = keyTick;                                // referencing keyTick so hasKey recomputes when it changes
  const needsKey = !!ENG.keyStorage;                      // does this engine need an API key?
  const hasKey = needsKey ? !!getKey(engine) : true;      // artifact engine: no key needed → treat as "has key"
  const mdlAudioLabel = () => ((MODELS.find(x => x.id === models.audio) || MODELS[0]) || {}).label || "";

  // on mount: restore selected engine. We DON'T force the settings modal open
  // anymore — the app opens straight into Review Mode so old decks can be
  // studied without an API key. A key is only needed to generate new sets.
  useEffect(() => {
    (async () => {
      const e = await getStoredEngine();
      setEngineState(e);
    })();
  }, []);

  // switch engine (persists choice). No longer force-opens settings on a
  // missing key — Review Mode handles the no-key case gracefully.
  function switchEngine(id) {
    if (!AVAILABLE_ENGINES[id] || id === engine) return;
    setStoredEngine(id);
    setEngineState(id);
    setKeyDraft("");
    setKeyTick(t => t + 1);
  }

  // tick every second while a grammar session is actively running
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);

  // both modes live in a ref; we re-render manually so switching is instant
  const M = useRef({ vocab: emptyMode(), grammar: emptyMode(), listening: emptyMode(), audio: emptyMode() });
  // stats live in a ref (history snapshots + completed-session log) — written directly to storage,
  // never via setState, so they can be updated safely even from inside a render pass.
  const STATS = useRef({ history: {}, sessions: [] });
  const cardAreaRef = useRef(null); // scroll target for the study card/deck area
  function scrollToCards() {
    // wait a tick so the deck has rendered, then bring it into view
    setTimeout(() => { try { cardAreaRef.current && cardAreaRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (e) {} }, 60);
  }

  const [gSection, setGSection] = useState("drill"); // grammar: 'lesson' | 'drill'
  const [openLesson, setOpenLesson] = useState(null); // index of expanded lesson
  const [vSection, setVSection] = useState("cards"); // vocab: 'cards' | 'quiz'
  const [showDiff, setShowDiff] = useState(false); // difficulty picker expanded?
  const [lSection, setLSection] = useState("strategy"); // listening: 'strategy' | 'practice'
  const [lquiz, setLquiz] = useState(null); // listening practice: { ptype, transcript, model, deck, pos, picked, start, end }
  const [aquiz, setAquiz] = useState(null); // LISTENING (audio) quiz — same shape as lquiz
  const [revealScript, setRevealScript] = useState(false); // audio: reveal transcript text (hidden by default so you LISTEN first)
  const [lFilter, setLFilter] = useState("all"); // listening strategy filter
  const [aSection, setASection] = useState("strategy"); // listening(audio): 'strategy' | 'practice'
  const [aFilter, setAFilter] = useState("all"); // listening(audio) strategy filter
  const [gLessonFilter, setGLessonFilter] = useState("all"); // grammar lesson status filter
  const [vquiz, setVquiz] = useState(null); // { deck, pos, picked, start, end, tooFew }
  // ---- timed mock exam ("สอบจริง") ----
  const [examScope, setExamScope] = useState("Part 5"); // selected scope id (EXAM_SCOPES key)
  const [exam, setExam] = useState(null); // active/finished exam:
  // { scope, parts, deck:[{id,_ptype,transcript,q,options,answer,explain}], picked:{}, pos,
  //   start, durationMs, submitted:bool, genErr, reveal:{} (per-id transcript reveal) }
  const [examGen, setExamGen] = useState(null); // { current, total } progress while generating, or null
  const [examBank, setExamBank] = useState({}); // saved exam decks for replay, keyed by id
  const [statsFilter, setStatsFilter] = useState(null); // Stats modal: null = all modes, else "vocab"|"grammar"|"listening"|"audio"
  const [revealTh, setRevealTh] = useState(false); // vocab card: show Thai meaning?

  useEffect(() => {
    (async () => {
      try {
        for (const m of ["vocab", "grammar", "listening", "audio"]) {
          try {
            const raw = await STORAGE.get(STORAGE_KEY[m]);
            const s = raw ? JSON.parse(raw) : {};
            M.current[m].data = (m === "vocab" ? s.words : m === "listening" ? s.lessons : m === "audio" ? s.clips : s.items) || {};
            M.current[m].ratings = s.ratings || {};
            // trust the data over the stored counter (which can reset, e.g. in the artifact sandbox)
            M.current[m].genCount = Math.max(s.genCount || 0, topGen(M.current[m].data));
            M.current[m].srs = s.srs || {};
            if (m === "vocab" || m === "listening" || m === "audio") M.current[m].missQ = s.missQ || {};
          } catch (e) { /* no data for this mode */ }
        }
        // SEED the static vocab bank: add any bank word the user doesn't already have.
        // gen:0 marks a bank word (AI gens are >=1). User ratings/SRS are untouched, and
        // an existing word (from AI or prior seed) is never overwritten. This guarantees a
        // full starter deck even with NO API key (Review Mode / mobile).
        {
          const v = M.current.vocab;
          const data = { ...v.data };
          let added = 0, tagged = 0;
          for (const e of VOCAB_BANK) {
            const key = e.w.toLowerCase().trim();
            if (!data[key]) {
              data[key] = { w: key, pos: e.pos, ipa: e.ipa, th: e.th, def: e.def, ex: e.ex, level: e.level, cefr: e.cefr, gen: 0, model: "คลังคำ" };
              added++;
            } else if (data[key].level !== e.level || data[key].cefr !== e.cefr) {
              // word already exists (AI-gen or earlier seed) — fold it into the bank's
              // level/CEFR WITHOUT touching the user's rating, SRS, or example sentence.
              data[key] = { ...data[key], level: e.level, cefr: e.cefr };
              tagged++;
            }
          }
          if (added > 0 || tagged > 0) { v.data = data; try { await persist("vocab"); } catch (e) {} }
        }
        // first-launch consistency: if the user has NO saved model prefs and NO saved difficulty,
        // seed the recommended model + thinking from the DEFAULT difficulty (Near-native) so the
        // app doesn't start at "Near-native" while quietly using the cheap default models.
        let savedModelsRaw = null, savedDiffRaw = null;
        try { savedModelsRaw = await STORAGE.get(MODEL_KEY); } catch (e) {}
        try { savedDiffRaw = await STORAGE.get(DIFF_KEY); } catch (e) {}
        if (savedModelsRaw) {
          try {
            const saved = JSON.parse(savedModelsRaw) || {};
            setModelsByEngine(prev => {
              const next = { ...prev };
              for (const eid of Object.keys(ENGINES)) {
                const list = ENGINES[eid].models;
                const rec = ENGINES[eid].recommended;
                const sv = (saved && saved[eid]) || {};
                next[eid] = {
                  vocab: list.some(x => x.id === sv.vocab) ? sv.vocab : rec.vocab,
                  grammar: list.some(x => x.id === sv.grammar) ? sv.grammar : rec.grammar,
                  listening: list.some(x => x.id === sv.listening) ? sv.listening : rec.listening,
                };
              }
              return next;
            });
          } catch (e) { /* bad saved model prefs */ }
        } else if (!savedDiffRaw) {
          // brand-new user → apply default difficulty's recommendation across all engines
          const d = diffById(DEFAULT_DIFFICULTY);
          setModelsByEngine(prev => {
            const next = { ...prev };
            for (const eid of Object.keys(ENGINES)) {
              const recModel = (d.rec && d.rec[eid]);
              if (recModel && ENGINES[eid].models.some(x => x.id === recModel)) {
                next[eid] = { vocab: recModel, grammar: recModel, listening: recModel };
              }
            }
            return next;
          });
        }
        try {
          const rdiff = await STORAGE.get(DIFF_KEY);
          if (rdiff) { const id = JSON.parse(rdiff); if (DIFFICULTIES.some(d => d.id === id)) setDifficultyState(id); }
        } catch (e) { /* no saved difficulty */ }
        try {
          const rd = await STORAGE.get(DAY_KEY);
          if (rd) { const d = parseInt(JSON.parse(rd), 10); if (!isNaN(d) && d >= 0) setDayCount(d); }
        } catch (e) { /* no saved day */ }
        try {
          const rs = await STORAGE.get(STREAK_KEY);
          if (rs) { const s = JSON.parse(rs); if (s && typeof s.streak === "number") setStreak({ streak: s.streak || 0, best: s.best || 0, last: s.last || null }); }
        } catch (e) { /* no saved streak */ }
        try {
          const rst = await STORAGE.get(STATS_KEY);
          if (rst) { const s = JSON.parse(rst); STATS.current = { history: (s && s.history) || {}, sessions: (s && Array.isArray(s.sessions)) ? s.sessions : [], daily: (s && s.daily) || {} }; }
        } catch (e) { /* no saved stats */ }
        try {
          const rt = await STORAGE.get(READTYPE_KEY);
          if (rt) { const t = JSON.parse(rt); if (t === "part6" || t === "part7" || t === "mix") setReadType(t); }
        } catch (e) { /* no saved reading type */ }
        try {
          const rat = await STORAGE.get(AUDIOTYPE_KEY);
          if (rat) { const t = JSON.parse(rat); if (t === "part2" || t === "part3" || t === "part4" || t === "mix") setAudioType(t); }
        } catch (e) { /* no saved listening type */ }
        try {
          const rg = await STORAGE.get(GOAL_KEY);
          if (rg) { const n = parseInt(JSON.parse(rg), 10); if (GOAL_OPTIONS.includes(n)) setGoal(n); }
        } catch (e) { /* no saved goal */ }
        try {
          const reb = await STORAGE.get(EXAM_BANK_KEY);
          if (reb) { const b = JSON.parse(reb); if (b && typeof b === "object") setExamBank(b); }
        } catch (e) { /* no saved exam bank */ }
      } finally { setLoaded(true); }
    })();
  }, []);

  function chooseModel(id) {
    setModelsByEngine(prev => {
      const next = { ...prev, [engine]: { ...prev[engine], [mode]: id } };
      STORAGE.set(MODEL_KEY, JSON.stringify(next));
      return next;
    });
  }


  // choose a difficulty level. Auto-applies the recommended model (for the CURRENT engine,
  // across all 3 modes) and the recommended thinking on/off (for thinking-eligible modes).
  function applyDifficulty(id) {
    const d = diffById(id);
    setDifficultyState(id);
    STORAGE.set(DIFF_KEY, JSON.stringify(id));

    // recommended model for the current engine (fall back to the engine's own recommended)
    const recModel = (d.rec && d.rec[engine]) || RECOMMENDED[mode];
    if (recModel && MODELS.some(x => x.id === recModel)) {
      setModelsByEngine(prev => {
        const next = { ...prev, [engine]: { vocab: recModel, grammar: recModel, listening: recModel } };
        STORAGE.set(MODEL_KEY, JSON.stringify(next));
        return next;
      });
    }
  }

  function changeDay(delta) {
    setDayCount(prev => {
      const next = Math.max(0, prev + delta);
      STORAGE.set(DAY_KEY, JSON.stringify(next));
      return next;
    });
  }

  // ---- auto streak: bump when the user does anything "study"-like on a new calendar day ----
  function touchStreak() {
    setStreak(prev => {
      const today = todayStr();
      if (prev.last === today) return prev; // already counted today
      const y = todayStr(Date.now() - DAY_MS);
      const next = prev.last === y ? (prev.streak || 0) + 1 : 1; // continued vs reset
      const out = { streak: next, best: Math.max(prev.best || 0, next), last: today };
      STORAGE.set(STREAK_KEY, JSON.stringify(out));
      return out;
    });
  }

  // ---- stats: persist the STATS ref to storage (no setState — safe to call anytime) ----
  function persistStats() { try { STORAGE.set(STATS_KEY, JSON.stringify(STATS.current)); } catch (e) {} }
  // count "mastered" (known) + totals per mode for a daily snapshot
  function masteryCounts() {
    const v = M.current.vocab, g = M.current.grammar, l = M.current.listening;
    const vt = Object.keys(v.data).length;
    const vk = Object.keys(v.data).filter(k => v.ratings[k] === "known").length;
    const gItems = Object.values(g.data);
    const gt = gItems.length;
    const gk = gItems.filter(x => g.ratings[x.id] === "known").length;
    let rt = 0, rk = 0;
    for (const p of Object.values(l.data)) for (const q of (p.questions || [])) { rt++; if (l.ratings[q.id] === "known") rk++; }
    const a = M.current.audio;
    let at = 0, ak = 0;
    for (const p of Object.values(a.data)) for (const q of (p.questions || [])) { at++; if (a.ratings[q.id] === "known") ak++; }
    return { vt, vk, gt, gk, rt, rk, at, ak };
  }
  // write/refresh TODAY's snapshot of cumulative mastery (called after any change)
  function updateHistory() {
    const c = masteryCounts();
    STATS.current.history = { ...STATS.current.history, [todayStr()]: c };
    persistStats();
  }
  // log one completed practice session (for the accuracy-over-time chart).
  // `part` is optional and records WHICH TOEIC part the round was (e.g. "Part 7"),
  // so we can show accuracy broken down by part — not just by mode.
  function logSession(modeName, correct, total, part) {
    if (!total) return;
    const entry = { d: Date.now(), m: modeName, c: correct, n: total };
    if (part) entry.p = part;
    const arr = (STATS.current.sessions || []).concat([entry]);
    STATS.current.sessions = arr.slice(-120); // keep the most recent 120
    persistStats();
  }
  // daily-goal counter: one tick per card/question the user actually engages with today.
  // Called from the PRIMARY interaction of each mode so a single item is never double-counted
  // (vocab card = its rating; quizzes = the answer). Stored under STATS.daily[date].
  function bumpDaily() {
    const t = todayStr();
    const daily = { ...(STATS.current.daily || {}) };
    daily[t] = (daily[t] || 0) + 1;
    STATS.current.daily = daily;
    persistStats();
    // note: no rerender here — every caller already triggers one (rate/choose/setVquiz/setLquiz)
  }
  function todayDone() { return (STATS.current.daily || {})[todayStr()] || 0; }
  function cycleGoal() {
    const idx = GOAL_OPTIONS.indexOf(goal);
    const next = GOAL_OPTIONS[(idx + 1) % GOAL_OPTIONS.length];
    setGoal(next);
    STORAGE.set(GOAL_KEY, JSON.stringify(next));
  }

  // ---- SRS scheduling: update an item's next-due date when it's rated ----
  function bumpSrs(st, id, status) {
    const now = Date.now();
    st.srs = { ...st.srs, [id]: nextSrs(st.srs[id], status, now) };
  }
  // how many rated items in a mode are due for review right now
  function dueCountFor(modeName) {
    const st = M.current[modeName];
    const now = Date.now();
    if (modeName === "listening" || modeName === "audio") {
      let n = 0;
      for (const p of Object.values(st.data || {})) for (const q of (p.questions || [])) {
        const r = st.ratings[q.id]; if (r && isDue(st.srs[q.id], now)) n++;
      }
      return n;
    }
    const idOf = x => (modeName === "vocab" ? x.w : x.id);
    return Object.values(st.data).filter(x => { const id = idOf(x); return st.ratings[id] && isDue(st.srs[id], now); }).length;
  }
  // build a review deck of only the items that are SRS-due (any rating),
  // ordered by urgency: forgot first, then sort, then known (shuffled within each tier)
  function buildDueDeck() {
    const st = cur();
    const now = Date.now();
    const idOf = x => (mode === "vocab" ? x.w : x.id);
    const due = Object.values(st.data).filter(x => { const id = idOf(x); return st.ratings[id] && isDue(st.srs[id], now); });
    const tiers = { forgot: [], sort: [], known: [] };
    due.forEach(x => { const r = st.ratings[idOf(x)]; (tiers[r] || tiers.known).push(x); });
    const built = [...shuffle(tiers.forgot), ...shuffle(tiers.sort), ...shuffle(tiers.known)].slice(0, 40);
    st.deck = built; st.pos = 0; st.flipped = false; st.pickedMap = {}; st.tab = "study";
    if (mode === "grammar") { st.startTime = Date.now(); st.endTime = null; st.logged = false; }
    rerender(); scrollToCards();
  }
  // Reading: build an SRS-due review deck from the saved passage bank (urgency-ordered)
  function buildReadingDue() {
    const st = M.current.listening;
    const now = Date.now();
    const tiers = { forgot: [], sort: [], known: [] };
    for (const p of Object.values(st.data || {})) for (const q of (p.questions || [])) {
      if (st.ratings[q.id] && isDue(st.srs[q.id], now)) { const r = st.ratings[q.id]; (tiers[r] || tiers.known).push({ ...q, transcript: p.transcript, _ptype: p.ptype }); }
    }
    const deck = [...shuffle(tiers.forgot), ...shuffle(tiers.sort), ...shuffle(tiers.known)];
    if (!deck.length) return;
    setLquiz({ passageId: null, ptype: "ถึงกำหนดทบทวน", transcript: null, model: "", deck, pos: 0, picked: {}, start: Date.now(), end: null, isReview: true });
    setLSection("practice");
  }

  function chooseReadType(t) { setReadType(t); STORAGE.set(READTYPE_KEY, JSON.stringify(t)); }
  function chooseAudioType(t) { setAudioType(t); STORAGE.set(AUDIOTYPE_KEY, JSON.stringify(t)); }

  // weakness-by-topic for grammar: group RATED drill questions by their (normalized) grammar point,
  // count weak (forgot+sort) vs known, sorted weakest-first. Uses data already stored — no new logging.
  function grammarWeakness() {
    const g = M.current.grammar;
    const norm = p => (p || "").replace(/\s*\(.*?\)\s*/g, " ").replace(/\s+/g, " ").trim() || "อื่น ๆ";
    const map = {};
    for (const it of Object.values(g.data || {})) {
      const r = g.ratings[it.id];
      if (!r) continue; // only count questions the user has rated
      const key = norm(it.point);
      if (!map[key]) map[key] = { topic: key, total: 0, weak: 0, known: 0 };
      map[key].total++;
      if (r === "known") map[key].known++; else map[key].weak++;
    }
    return Object.values(map).sort((a, b) => b.weak - a.weak || b.total - a.total);
  }

  // weakness grouped by part (Reading: Part 6/7) — counts only rated questions
  function partWeakness(st) {
    const map = {};
    for (const p of Object.values(st.data || {})) {
      const key = p.ptype || "อื่น ๆ";
      for (const q of (p.questions || [])) {
        const r = st.ratings[q.id];
        if (!r) continue; // only count questions the user has rated
        if (!map[key]) map[key] = { topic: key, total: 0, weak: 0, known: 0 };
        map[key].total++;
        if (r === "known") map[key].known++; else map[key].weak++;
      }
    }
    return Object.values(map).sort((a, b) => b.weak - a.weak || b.total - a.total);
  }
  function readingWeakness() { return partWeakness(M.current.listening); }
  function listeningWeakness() { return partWeakness(M.current.audio); }

  function openStats() {
    // snapshot the ref into state so the modal renders a stable view
    updateHistory();
    setStatsFilter(null);
    setStatsView({ history: { ...STATS.current.history }, sessions: [...(STATS.current.sessions || [])] });
    setShowStats(true);
  }

  // open backup modal; for export, fill text asynchronously (compression is async)
  async function openBackup(kind) {
    if (kind === "export") {
      setBackup({ kind: "export", text: "กำลังเตรียมข้อมูล…", msg: null });
      const t = await exportData();
      setBackup(b => (b && b.kind === "export" ? { ...b, text: t } : b));
    } else {
      setBackup({ kind: "import", text: "", msg: null });
    }
  }

  const cur = () => M.current[mode] || M.current.vocab;

  async function persist(m) {
    const st = M.current[m];
    const payload = m === "vocab"
      ? { words: st.data, ratings: st.ratings, genCount: st.genCount, missQ: st.missQ, srs: st.srs }
      : m === "listening"
      ? { lessons: st.data, ratings: st.ratings, genCount: st.genCount, missQ: st.missQ, srs: st.srs }
      : m === "audio"
      ? { clips: st.data, ratings: st.ratings, genCount: st.genCount, missQ: st.missQ, srs: st.srs }
      : { items: st.data, ratings: st.ratings, genCount: st.genCount, srs: st.srs };
    const ok = await STORAGE.set(STORAGE_KEY[m], JSON.stringify(payload));
    if (!ok) setStorageOk(false);
  }

  async function generate() {
    if (needsKey && !hasKey) { setShowSettings(true); return; }
    const m = mode, st = cur();
    st.generating = true; st.genErr = null; st.lastAdded = null; rerender();
    try {
      const avoid = m === "vocab"
        ? Object.keys(st.data)
        : Object.values(st.data).map(x => x.q);
      const category = pickCategory();
      const mdl = MODELS.find(x => x.id === models[m]) || MODELS[0];
      const diffP = diffById(difficulty).prompt;
      const prompt = m === "vocab" ? vocabPrompt(avoid, category, diffP) : grammarPrompt(avoid, category, diffP);
      const arr = await aiCompleteJson({
        engineId: engine, model: mdl.str, maxTokens: genMaxTokens(mdl), prompt,
        validate: o => Array.isArray(o) && o.length,
      });

      const newGen = st.genCount + 1;
      const nextData = { ...st.data };
      const fresh = [];
      if (m === "vocab") {
        for (const item of arr) {
          if (!item || !item.w) continue;
          const key = String(item.w).toLowerCase().trim();
          if (nextData[key]) continue;
          const obj = { w: key, pos: item.pos || "", ipa: item.ipa || "", th: item.th || "", def: item.def || "", ex: item.ex || "", gen: newGen, model: mdl.label };
          nextData[key] = obj; fresh.push(obj);
        }
      } else {
        arr.forEach((it, i) => {
          if (!it || !it.q || !it.options || !it.answer) return;
          const sq = shuffleQuestionOptions(it);
          const id = `g${newGen}-${i}-${Math.random().toString(36).slice(2, 6)}`;
          const obj = { id, q: sq.q, options: sq.options, answer: sq.answer, point: sq.point || "", explain: sq.explain || "", gen: newGen, model: mdl.label };
          nextData[id] = obj; fresh.push(obj);
        });
      }
      st.data = nextData; st.genCount = newGen;
      st.deck = shuffle(fresh); st.pos = 0; st.flipped = false; st.pickedMap = {};
      st.tab = "study"; st.lastAdded = fresh.length; st.lastCategory = category;
      if (m === "grammar") { st.startTime = Date.now(); st.endTime = null; st.logged = false; }
      await persist(m);
      touchStreak(); updateHistory();
    } catch (e) {
      st.genErr = "สร้างชุดใหม่ไม่สำเร็จ — " + (e && e.message ? e.message : String(e));
    } finally {
      st.generating = false; rerender();
      if (!st.genErr) scrollToCards();
    }
  }

  function buildReviewDeck() {
    const st = cur();
    const all = Object.values(st.data);
    const key = m => (st.data[m]); // unused
    const idOf = x => (mode === "vocab" ? x.w : x.id);
    const forgot = all.filter(x => st.ratings[idOf(x)] === "forgot");
    const sort = all.filter(x => st.ratings[idOf(x)] === "sort");
    const built = shuffle([...forgot.slice(0, 20), ...sort.slice(0, 10)]);
    st.deck = built; st.pos = 0; st.flipped = false; st.pickedMap = {}; st.tab = "study";
    if (mode === "grammar") { st.startTime = Date.now(); st.endTime = null; st.logged = false; }
    rerender();
    scrollToCards();
  }
  // Vocab: build a 10-card study deck from the static bank at a given level, using a
  // PRIORITY LADDER so each tap focuses on what matters most:
  //   1) fresh  — words never rated yet
  //   2) weak   — "forgot" (ยังจำไม่ได้) + "sort" (จำได้บ้าง)
  //   3) known  — already mastered, recycled only when 1 & 2 are exhausted
  // It takes from the highest non-empty tier and does NOT mix tiers, so the deck stays
  // focused. Returns the number of cards put in the deck.
  function bankTiers(level) {
    const v = M.current.vocab;
    const at = Object.values(v.data).filter(x => x.level === level);
    const fresh = at.filter(x => !v.ratings[x.w]);
    const weak = at.filter(x => v.ratings[x.w] === "forgot" || v.ratings[x.w] === "sort");
    const known = at.filter(x => v.ratings[x.w] === "known");
    return { at, fresh, weak, known };
  }
  function buildBankLevelDeck(level) {
    const v = M.current.vocab;
    const { fresh, weak, known } = bankTiers(level);
    const pool = fresh.length ? fresh : weak.length ? weak : known;
    if (!pool.length) return 0;
    v.deck = shuffle(pool).slice(0, 10); v.pos = 0; v.flipped = false; v.pickedMap = {}; v.tab = "study";
    setRevealTh(false);
    rerender();
    scrollToCards();
    return v.deck.length;
  }
  // total bank words at a level (for the "x/total" display)
  function bankLevelTotal(level) {
    return bankTiers(level).at.length;
  }
  // describe which tier the NEXT tap will pull from, for the picker label.
  function bankLevelStatus(level) {
    const { at, fresh, weak, known } = bankTiers(level);
    if (!at.length) return { kind: "empty", n: 0, label: "—" };
    if (fresh.length) return { kind: "fresh", n: fresh.length, label: `🆕 คำใหม่ ${fresh.length}` };
    if (weak.length) return { kind: "weak", n: weak.length, label: `🔁 ทบทวน ${weak.length}` };
    return { kind: "known", n: known.length, label: `✓ รีคำที่แม่น ${known.length}` };
  }

  function rate(id, status, advance) {
    const st = cur();
    st.ratings = { ...st.ratings, [id]: status };
    bumpSrs(st, id, status);
    persist(mode);
    touchStreak(); updateHistory();
    if (mode === "vocab") bumpDaily(); // vocab card: the rating IS the interaction (grammar counts via choose())
    if (advance) { st.flipped = false; st.pos = Math.min(st.pos + 1, st.deck.length); }
    rerender();
  }

  function choose(id, key) {
    const st = cur();
    if (st.pickedMap[id]) return;
    st.pickedMap = { ...st.pickedMap, [id]: key };
    bumpDaily(); // first answer of this grammar question
    rerender();
  }

  // ---- Vocab Quiz (cloze / fill-in-the-sentence only) ----
  function makeClozeItem(word, pool, idx, idPrefix) {
    const letters = ["A", "B", "C", "D"];
    const safe = word.w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp("\\b" + safe + "\\b", "i");
    const prompt = word.ex.replace(re, "____");
    const others = shuffle(pool.filter(x => x.w !== word.w)).slice(0, 3).map(x => x.w);
    const opts = shuffle([word.w, ...others]);
    return {
      id: idPrefix + idx, prompt, options: { A: opts[0], B: opts[1], C: opts[2], D: opts[3] },
      answer: letters[opts.indexOf(word.w)], word: word.w, th: word.th, model: word.model || "",
    };
  }
  function buildVocabQuiz() {
    const all = Object.values(M.current.vocab.data);
    // cloze needs the word to appear in its own example sentence
    const usable = all.filter(w => w.ex && new RegExp("\\b" + w.w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "i").test(w.ex));
    if (usable.length < 4) { setVquiz({ deck: [], pos: 0, picked: {}, start: null, end: null, tooFew: true }); return; }
    const picks = shuffle(usable).slice(0, Math.min(10, usable.length));
    const deck = picks.map((w, i) => makeClozeItem(w, all, i, "vq"));
    setVquiz({ deck, pos: 0, picked: {}, start: Date.now(), end: null, isReview: false });
  }
  function buildMissedQuiz() {
    const missed = Object.values(M.current.vocab.missQ || {});
    if (!missed.length) return;
    // re-shuffle options each review attempt
    const deck = shuffle(missed).map((q, i) => {
      const letters = ["A", "B", "C", "D"];
      const correctText = q.options[q.answer];
      const opts = shuffle(Object.values(q.options));
      return { ...q, id: "rv" + i, options: { A: opts[0], B: opts[1], C: opts[2], D: opts[3] }, answer: letters[opts.indexOf(correctText)] };
    });
    setVquiz({ deck, pos: 0, picked: {}, start: Date.now(), end: null, isReview: true });
  }
  function chooseQuiz(id, key) {
    if (vquiz && vquiz.picked[id]) return; // already answered — don't double count
    bumpDaily();
    setVquiz(v => (v.picked[id] ? v : { ...v, picked: { ...v.picked, [id]: key } }));
  }
  function nextQuiz() {
    setVquiz(v => ({ ...v, pos: Math.min(v.pos + 1, v.deck.length) }));
  }
  // add a missed question to the persistent review bank (keyed by word)
  function addMissed(item) {
    const st = M.current.vocab;
    const key = item.word;
    st.missQ = { ...st.missQ, [key]: { prompt: item.prompt, options: item.options, answer: item.answer, word: item.word, th: item.th, model: item.model || "" } };
    persist("vocab");
  }
  function removeMissed(word) {
    const st = M.current.vocab;
    const next = { ...st.missQ };
    delete next[word];
    st.missQ = next;
    persist("vocab");
    rerender();
  }
  function flagWrongForReview(missedWords) {
    const st = M.current.vocab;
    const next = { ...st.ratings };
    missedWords.forEach(w => { next[w] = "forgot"; });
    st.ratings = next;
    persist("vocab");
    rerender();
  }

  function chooseLQ(id, key) { if (lquiz && lquiz.picked[id]) return; bumpDaily(); setLquiz(v => (v.picked[id] ? v : { ...v, picked: { ...v.picked, [id]: key } })); }
  function nextLQ() { setLquiz(v => ({ ...v, pos: Math.min(v.pos + 1, v.deck.length) })); }
  // build a review deck from Reading questions the user rated "forgot"/"sort" (not yet mastered),

  function nextAQ() { setAquiz(v => ({ ...v, pos: Math.min(v.pos + 1, v.deck.length) })); }
  // Listening: SRS-due review deck from the saved clip bank (urgency-ordered)

  // ---- TIMED MOCK EXAM ("สอบจริง") ----
  // Build the prompt for one exam unit of a given part, reusing the existing builders.
  function examPromptFor(part, diffP) {
    const cat = pickCategory();
    switch (part) {
      case "Part 5": return { prompt: grammarPrompt([], cat, diffP), kind: "array" };
      case "Part 6": return { prompt: listeningPart6Prompt(cat, diffP), kind: "passage" };
      case "Part 7": return { prompt: listeningPracticePrompt(cat, diffP), kind: "passage" };
      case "Part 2": return { prompt: audioPart2Prompt(cat, diffP), kind: "passage" };
      case "Part 3": return { prompt: audioPart3Prompt(cat, diffP), kind: "passage" };
      case "Part 4": return { prompt: audioPart4Prompt(cat, diffP), kind: "passage" };
      default: return null;
    }
  }
  async function genExam() {
    if (needsKey && !hasKey) { setShowSettings(true); return; }
    const plan = examPlan(examScope);
    const mdl = MODELS.find(x => x.id === models.audio) || MODELS[0]; // reuse audio's chosen model
    const diffP = diffById(difficulty).prompt;
    // ordered list of (part) units to generate
    const unitParts = [];
    for (const part of plan.parts) for (let u = 0; u < EXAM_PARTS[part].units; u++) unitParts.push(part);
    setExamGen({ current: 0, total: unitParts.length });
    setExam({ scope: examScope, parts: plan.parts, deck: [], picked: {}, pos: 0, start: null, durationMs: plan.totalSec * 1000, submitted: false, genErr: null, reveal: {}, building: true });
    const deck = [];
    try {
      for (let i = 0; i < unitParts.length; i++) {
        const part = unitParts[i];
        const { prompt, kind } = examPromptFor(part, diffP);
        const obj = await aiCompleteJson({
          engineId: engine, model: mdl.str, maxTokens: genMaxTokens(mdl), prompt,
          validate: o => kind === "array" ? (Array.isArray(o) && o.length) : (o && Array.isArray(o.questions) && o.questions.length),
        });
        const transcript = kind === "passage" ? (obj.transcript || "") : "";
        const qs = kind === "array" ? obj : obj.questions;
        qs.forEach((q, qi) => {
          if (!q || !q.q || !q.options || !q.answer) return;
          const sq = shuffleQuestionOptions(q);
          deck.push({
            id: `ex${i}-${qi}`, _ptype: part, transcript,
            q: sq.q, options: sq.options, answer: sq.answer, explain: sq.explain || "",
          });
        });
        setExamGen({ current: i + 1, total: unitParts.length });
      }
      if (!deck.length) throw new Error("สร้างข้อสอบไม่ได้เลยสักข้อ — ลองกดเริ่มสอบใหม่อีกครั้งครับ");
      // SAVE the freshly-generated deck to the bank so it can be REPLAYED without re-gen
      // (a full mock costs many tokens). Cap to the 20 most recent to bound storage.
      const examId = "exam" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      setExamBank(prev => {
        const next = { ...prev, [examId]: { id: examId, scope: examScope, parts: plan.parts, deck, n: deck.length, durationMs: plan.totalSec * 1000, gen: Date.now() } };
        const ids = Object.keys(next).sort((a, b) => (next[b].gen || 0) - (next[a].gen || 0));
        if (ids.length > 20) for (const k of ids.slice(20)) delete next[k];
        STORAGE.set(EXAM_BANK_KEY, JSON.stringify(next));
        return next;
      });
      setExam(e => ({ ...e, deck, start: Date.now(), building: false }));
    } catch (err) {
      setExam(e => ({ ...e, building: false, genErr: "สร้างชุดสอบไม่สำเร็จ — " + (err && err.message ? err.message : String(err)) }));
    } finally {
      setExamGen(null);
    }
  }
  function pickExam(id, key) {
    setExam(e => (e.submitted ? e : { ...e, picked: { ...e.picked, [id]: key } }));
  }
  function examGoto(pos) { setExam(e => ({ ...e, pos: Math.max(0, Math.min(pos, e.deck.length - 1)) })); }
  function examToggleReveal(id) { setExam(e => ({ ...e, reveal: { ...e.reveal, [id]: !e.reveal[id] } })); }
  function submitExam() {
    setExam(e => {
      if (!e || e.submitted) return e;
      const ended = { ...e, submitted: true, end: Date.now() };
      // log one session PER PART so the per-part dashboard (A) picks it up
      const byPart = {};
      for (const it of e.deck) {
        const p = it._ptype;
        if (!byPart[p]) byPart[p] = { c: 0, n: 0 };
        byPart[p].n++;
        if (e.picked[it.id] === it.answer) byPart[p].c++;
      }
      const skillModeOf = pt => (EXAM_PARTS[pt] && EXAM_PARTS[pt].skill === "listening") ? "audio" : (pt === "Part 5" ? "grammar" : "listening");
      for (const [p, v] of Object.entries(byPart)) logSession(skillModeOf(p), v.c, v.n, p);
      touchStreak(); updateHistory();
      return ended;
    });
  }
  function quitExam() { setExam(null); setExamGen(null); }
  // replay a SAVED exam deck (no re-generation) — fresh attempt: clears answers, restarts timer
  function replaySavedExam(id) {
    const ex = examBank[id]; if (!ex) return;
    const dur = ex.durationMs || ((examPlan(ex.scope) || {}).totalSec || 0) * 1000;
    setExam({ scope: ex.scope, parts: ex.parts, deck: (ex.deck || []).map(q => ({ ...q })), picked: {}, pos: 0, start: Date.now(), durationMs: dur, submitted: false, genErr: null, reveal: {}, building: false });
  }
  function deleteSavedExam(id) {
    setExamBank(prev => { const next = { ...prev }; delete next[id]; STORAGE.set(EXAM_BANK_KEY, JSON.stringify(next)); return next; });
  }
  // human label for an exam scope id (single part, or a combined set)
  function examScopeLabel(scope) {
    if (scope === "listening") return "🎧 Listening รวม";
    if (scope === "reading") return "📖 Reading รวม";
    return scope; // e.g. "Part 5"
  }

  // ---- copy helpers (for asking Coach in chat) ----
  function openCopy(title, text) { setCopyBox({ title, text, msg: null }); }
  function copyUnmasteredVocab() {
    const st = M.current.vocab;
    const all = Object.values(st.data);
    const list = all.filter(w => { const s = st.ratings[w.w]; return s === "forgot" || s === "sort"; });
    if (!list.length) { openCopy("คำที่ยังไม่แม่น", "ยังไม่มีคำที่ทำเครื่องหมาย 'จำไม่ได้' หรือ 'จำได้บ้าง' เลยครับ"); return; }
    const lines = list.map((w, i) => {

  function resetAll() {

  }
  async function doReset() {
    M.current[mode] = emptyMode();
    if (mode === "vocab") setVquiz(null);
    if (mode === "listening") setLquiz(null);
    if (mode === "audio") setAquiz(null);

  // Progress-only reset (ALL modes): keeps every generated word/question/passage + set numbers,
  // but clears learning progress — ratings (back to "new"), SRS schedule, missed-quiz banks —
  // plus the global dashboard (stats history, sessions, streak, day counter). For handing the
  // app to another learner without regenerating all the content.
  async function doResetProgress() {
    for (const m of ["vocab", "grammar", "listening", "audio"]) {
      const st = M.current[m];
      st.ratings = {}; st.srs = {}; st.missQ = {};
      st.deck = []; st.pos = 0; st.flipped = false; st.pickedMap = {};
      st.startTime = null; st.endTime = null; st.logged = false;

    }
    setVquiz(null); setLquiz(null); setAquiz(null);

    STATS.current = { history: {}, sessions: [], daily: {} };
    persistStats();

    setDayCount(0);
    await STORAGE.set(DAY_KEY, JSON.stringify(0));
    setConfirmReset(false);
    rerender();
  }

  // ---- backup / restore (export/import the whole app state as a portable text blob) ----
  function buildBackupJson() {
    const payload = {
      _toeic_trainer: 1,
      _v: 2, // backup format version (extra fields below are NOT covered by the legacy checksum)
      day: dayCount,
      vocab: { words: M.current.vocab.data, ratings: M.current.vocab.ratings, genCount: M.current.vocab.genCount, missQ: M.current.vocab.missQ },
      grammar: { items: M.current.grammar.data, ratings: M.current.grammar.ratings, genCount: M.current.grammar.genCount },
      listening: { lessons: M.current.listening.data, ratings: M.current.listening.ratings, genCount: M.current.listening.genCount, missQ: M.current.listening.missQ },
      audio: { clips: M.current.audio.data, ratings: M.current.audio.ratings, genCount: M.current.audio.genCount, missQ: M.current.audio.missQ },
      // ---- v2 extras (purposely excluded from canonicalBackup so the checksum stays backward-compatible) ----
      srs: { vocab: M.current.vocab.srs || {}, grammar: M.current.grammar.srs || {}, listening: M.current.listening.srs || {}, audio: M.current.audio.srs || {} },
      streak: streak,
      stats: { history: STATS.current.history || {}, sessions: STATS.current.sessions || [], daily: STATS.current.daily || {} },
    };
    payload._checksum = fnv1a(canonicalBackup(payload)); // integrity tag (verified on import) — legacy fields only
    return JSON.stringify(payload);
  }
  // returns compressed backup string (or raw JSON if pako unavailable)
  async function exportData() {
    return await compressBackup(buildBackupJson());
  }
  // save backup as a downloadable .json file (resilient: no copy-paste char loss)
  function downloadBackup() {
    try {
      const json = buildBackupJson(); // plain, human-readable JSON with checksum inside
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      // fixed filename (no date/day) so each save REPLACES the previous file instead of
      // piling up many copies in the downloads folder. The newest data is always in toeic-backup.json.
      const a = document.createElement("a");
      a.href = url;
      a.download = "toeic-backup.json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setBackup(b => (b ? { ...b, msg: "บันทึกไฟล์ toeic-backup.json แล้ว ✓ (ทับไฟล์เดิม ไม่กองหลายไฟล์)" } : b));
    } catch (e) {
      setBackup(b => (b ? { ...b, msg: "บันทึกไฟล์อัตโนมัติไม่ได้ — ใช้วิธีก๊อปข้อความด้านล่างแทนได้ครับ" } : b));
    }
  }
  // human-readable length helper for the char-count badges
  const fmtLen = n => (n || 0).toLocaleString("en-US");

  // mode="overwrite" (default) replaces everything; mode="merge" keeps existing data + ratings
  // and only ADDS new words/items/lessons from the backup (so studied progress isn't lost).
  async function importData(text, mode = "overwrite") {
    let jsonStr;
    try { jsonStr = await decompressBackup(text); }
    catch (e) { return "คลายโค้ดบีบอัดไม่สำเร็จ (เชื่อมเน็ตแล้วลองใหม่ หรือโค้ดไม่ครบ)"; }
    let obj;
    try { obj = JSON.parse((jsonStr || "").trim()); } catch (e) { return "โค้ดไม่ถูกต้อง (อ่านไม่ได้)"; }
    if (!obj || !obj._toeic_trainer) return "โค้ดนี้ไม่ใช่ข้อมูลของแอปนี้";
    // integrity check: if the backup carries a checksum, make sure data isn't damaged
    if (obj._checksum) {
      const calc = fnv1a(canonicalBackup(obj));
      if (calc !== obj._checksum) return "ไฟล์/โค้ดสำรองนี้เสียหาย (checksum ไม่ตรง) — ข้อมูลถูกแก้หรือไม่ครบ จึงไม่กู้คืนเพื่อกันข้อมูลพัง";
    }
    const isMerge = mode === "merge";
    // merge rule for the data/ratings maps:
    //  - data:    existing entries WIN (keep what's already there), incoming adds only new keys
    //  - ratings: existing ratings WIN (don't clobber studied progress with backup's older state)
    const mergeMap = (existing, incoming, existingWins) =>
      existingWins ? { ...(incoming || {}), ...(existing || {}) } : { ...(existing || {}), ...(incoming || {}) };
    try {
      if (obj.vocab) {
        M.current.vocab.data = isMerge ? mergeRenumberGen(M.current.vocab.data, obj.vocab.words) : (obj.vocab.words || {});
        M.current.vocab.ratings = isMerge ? mergeMap(M.current.vocab.ratings, obj.vocab.ratings, true) : (obj.vocab.ratings || {});
        M.current.vocab.genCount = Math.max(M.current.vocab.genCount || 0, obj.vocab.genCount || 0, topGen(M.current.vocab.data));
        M.current.vocab.missQ = isMerge ? mergeMap(M.current.vocab.missQ, obj.vocab.missQ, true) : (obj.vocab.missQ || {});
        M.current.vocab.deck = []; M.current.vocab.pos = 0; M.current.vocab.pickedMap = {};
        await persist("vocab");
      }
      if (obj.grammar) {
        M.current.grammar.data = isMerge ? mergeRenumberGen(M.current.grammar.data, obj.grammar.items) : (obj.grammar.items || {});
        M.current.grammar.ratings = isMerge ? mergeMap(M.current.grammar.ratings, obj.grammar.ratings, true) : (obj.grammar.ratings || {});
        M.current.grammar.genCount = Math.max(M.current.grammar.genCount || 0, obj.grammar.genCount || 0, topGen(M.current.grammar.data));
        M.current.grammar.deck = []; M.current.grammar.pos = 0; M.current.grammar.pickedMap = {};
        await persist("grammar");
      }
      if (obj.listening) {
        M.current.listening.data = isMerge ? mergeMap(M.current.listening.data, obj.listening.lessons, true) : (obj.listening.lessons || {});
        M.current.listening.ratings = isMerge ? mergeMap(M.current.listening.ratings, obj.listening.ratings, true) : (obj.listening.ratings || {});
        M.current.listening.genCount = isMerge ? Math.max(M.current.listening.genCount || 0, obj.listening.genCount || 0) : (obj.listening.genCount || 0);
        M.current.listening.missQ = isMerge ? mergeMap(M.current.listening.missQ, obj.listening.missQ, true) : (obj.listening.missQ || {});
        M.current.listening.deck = []; M.current.listening.pos = 0; M.current.listening.pickedMap = {};
        await persist("listening");
      }
      if (obj.audio) {
        M.current.audio.data = isMerge ? mergeMap(M.current.audio.data, obj.audio.clips, true) : (obj.audio.clips || {});
        M.current.audio.ratings = isMerge ? mergeMap(M.current.audio.ratings, obj.audio.ratings, true) : (obj.audio.ratings || {});
        M.current.audio.genCount = isMerge ? Math.max(M.current.audio.genCount || 0, obj.audio.genCount || 0) : (obj.audio.genCount || 0);
        M.current.audio.missQ = isMerge ? mergeMap(M.current.audio.missQ, obj.audio.missQ, true) : (obj.audio.missQ || {});
        M.current.audio.deck = []; M.current.audio.pos = 0; M.current.audio.pickedMap = {};
        await persist("audio");
      }
      if (typeof obj.day === "number" && obj.day >= 0) {
        const nextDay = isMerge ? Math.max(dayCount || 0, obj.day) : obj.day; // merge keeps the higher day count
        setDayCount(nextDay);
        STORAGE.set(DAY_KEY, JSON.stringify(nextDay));
      }
      // ---- v2 extras (absent in old backups → simply skipped) ----
      if (obj.srs) {
        M.current.vocab.srs = isMerge ? mergeMap(M.current.vocab.srs, obj.srs.vocab, true) : (obj.srs.vocab || {});
        M.current.grammar.srs = isMerge ? mergeMap(M.current.grammar.srs, obj.srs.grammar, true) : (obj.srs.grammar || {});
        M.current.listening.srs = isMerge ? mergeMap(M.current.listening.srs, obj.srs.listening, true) : (obj.srs.listening || {});
        M.current.audio.srs = isMerge ? mergeMap(M.current.audio.srs, obj.srs.audio, true) : (obj.srs.audio || {});
        await persist("vocab"); await persist("grammar"); await persist("listening"); await persist("audio");
      }
      if (obj.streak && typeof obj.streak.streak === "number") {
        const incoming = { streak: obj.streak.streak || 0, best: obj.streak.best || 0, last: obj.streak.last || null };
        const nextStreak = isMerge
          ? { streak: Math.max(streak.streak || 0, incoming.streak), best: Math.max(streak.best || 0, incoming.best), last: (streak.last || "") > (incoming.last || "") ? streak.last : incoming.last }
          : incoming;
        setStreak(nextStreak);
        STORAGE.set(STREAK_KEY, JSON.stringify(nextStreak));
      }
      if (obj.stats) {
        const inHist = obj.stats.history || {};
        const inSess = Array.isArray(obj.stats.sessions) ? obj.stats.sessions : [];
        const inDaily = obj.stats.daily || {};
        if (isMerge) {
          STATS.current.history = { ...inHist, ...(STATS.current.history || {}) }; // existing day snapshots win
          const merged = [...(STATS.current.sessions || []), ...inSess].sort((a, b) => (a.d || 0) - (b.d || 0));
          STATS.current.sessions = merged.slice(-120);
          // daily: keep the larger count per day (in case both devices studied that day)
          const mergedDaily = { ...inDaily };
          for (const [d, n] of Object.entries(STATS.current.daily || {})) mergedDaily[d] = Math.max(mergedDaily[d] || 0, n);
          STATS.current.daily = mergedDaily;
        } else {
          STATS.current = { history: inHist, sessions: inSess.slice(-120), daily: inDaily };
        }
        persistStats();
      }
      rerender();
      return null; // success
    } catch (e) { return "กู้คืนไม่สำเร็จ ลองตรวจโค้ดอีกครั้ง"; }
  }

  // shared handler for every restore button: import (overwrite|merge) then reset to a clean home view
  async function runRestore(text, mode) {
    if (!text || !text.trim()) { setBackup(b => ({ ...b, msg: "ยังไม่มีโค้ด/ไฟล์ให้กู้คืน" })); return; }
    const err = await importData(text, mode);
    if (err) { setBackup(b => ({ ...b, msg: err })); return; }
    setVquiz(null); setLquiz(null); setAquiz(null);
    setVSection("cards"); setGSection("drill"); setLSection("strategy"); setASection("strategy");
    cur().tab = "study";

    setTimeout(() => setBackup(null), 900);
  }

  // Read the clipboard directly via the JS API. This bypasses the mobile <textarea>
  // paste limit (~20,000 chars) that silently truncates a long pasted code, because the
  // text never goes through a paste event — we get the full string and set it ourselves.
  async function pasteFromClipboard() {
    try {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        setBackup(b => ({ ...b, msg: "เบราว์เซอร์นี้ไม่รองรับวางอัตโนมัติ — แตะในกล่องแล้ววางเองได้ครับ" }));
        return;
      }
      const txt = await navigator.clipboard.readText();
      if (!txt || !txt.trim()) {
        setBackup(b => ({ ...b, msg: "คลิปบอร์ดว่าง — ไปกดก๊อปโค้ดสำรองก่อนนะครับ" }));
        return;
      }
      setBackup(b => ({ ...b, text: txt, msg: `วางอัตโนมัติแล้ว ${fmtLen(txt.length)} ตัวอักษร ✓ (ครบไม่ติด limit)` }));
    } catch (e) {
      setBackup(b => ({ ...b, msg: "วางอัตโนมัติไม่ได้ (เบราว์เซอร์ไม่อนุญาตอ่านคลิปบอร์ด) — แตะในกล่องแล้ววางเองได้ครับ" }));
    }
  }

  const setTab = t => { cur().tab = t; rerender(); };
  const setFlip = () => { cur().flipped = !cur().flipped; setRevealTh(false); rerender(); };
  const setPos = fn => { const st = cur(); st.flipped = false; st.pos = fn(st.pos); setRevealTh(false); rerender(); };
  const setBankFilter = f => { cur().bankFilter = f; setBankShow(60); rerender(); };

  const st = cur();
  const S = STATUS[mode];
  const idOf = x => (mode === "vocab" ? x.w : x.id);
  const counts = Object.values(st.data).reduce(
    (acc, x) => { const s = st.ratings[idOf(x)]; if (!s) acc.new++; else acc[s]++; return acc; },
    { new: 0, forgot: 0, sort: 0, known: 0 }
  );
  const total = Object.keys(st.data).length;
  const genIdx = genIndexMap(st.data); // rawGen → 1..N for gapless "ชุด N" labels in the bank
  // items shown in the bank. vocab → alphabetical + text search (you look words up);
  // grammar/reading → newest set first (you review by set).
  // bankBase = status-filtered (+ vocab text search), BEFORE the CEFR level filter — so the
  // level chips can show per-level counts off the same base.
  const bankBase = Object.values(st.data).filter(x => {
    const s = st.ratings[idOf(x)] || "new";
    if (!(st.bankFilter === "all" || s === st.bankFilter)) return false;
    if (mode === "vocab") {

    }
    return true;
  });
  const vocabLevelCounts = mode === "vocab" ? (() => {
    const c = { all: bankBase.length, A1: 0, A2: 0, B1: 0, B2: 0, C1: 0, C2: 0, none: 0 };
    for (const x of bankBase) { if (x.cefr && c[x.cefr] != null) c[x.cefr]++; else if (!x.cefr) c.none++; }
    return c;
  })() : null;
  const bankItems = (() => {

    if (mode === "vocab") {
      if (bankLevel !== "all") items = bankLevel === "none" ? items.filter(x => !x.cefr) : items.filter(x => x.cefr === bankLevel);
      // plain string compare (ASCII lowercase) — far faster than localeCompare on ~1k words
      items = items.slice().sort((a, b) => { const wa = a.w || "", wb = b.w || ""; return wa < wb ? -1 : wa > wb ? 1 : 0; });
    } else {
      items = items.slice().sort((a, b) => (b.gen || 0) - (a.gen || 0));
    }
    return items;

  const reviewable = counts.forgot + counts.sort;

      `}</style>

      <div style={{ maxWidth: 600, margin: "0 auto" }}>

          <h1 style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 27, margin: 0, letterSpacing: "-0.5px", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>

                          <div style={{ fontSize: 13, color: C.accent, fontWeight: 600, marginBottom: 8 }}>{ls.point}</div>
                          <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.7, marginBottom: 10 }}>{ls.body}</div>
                          {ls.examples && ls.examples.length > 0 && (
                            <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>

                                <div key={j} style={{ fontSize: 13.5, color: C.ink, lineHeight: 1.6, marginBottom: j < ls.examples.length - 1 ? 4 : 0 }}>• {ex}</div>

                            </div>

                            <div style={{ display: "flex", gap: 8, alignItems: "flex-start", background: C.redBg, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>
