                            </div>
                          )}
                          <RatingRow mode="listening" current={st.ratings[ls.id]} onRate={s => rate(ls.id, s, false)} small />
                        </div>
                      )}
                    </div>
                  );
                })}
                {shown.length === 0 && <Centered>ไม่มีบทเรียนในหมวดนี้</Centered>}
              </div>
            </div>
          );
        })()}

        {/* ===== LISTENING · PRACTICE VIEW ===== */}
        {mode === "listening" && lSection === "practice" && (() => {
          const st = M.current.listening;
          const v = lquiz;
          const missCount = Object.keys(st.missQ || {}).length;
          if (!v) {
            return (
              <div className="rise">
                <div style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.6, marginBottom: 12 }}>
                  ฝึกอ่านแนวข้อสอบจริงแล้วตอบคำถามจับเวลา — <b>Part 7</b> (จับใจความจากอีเมล/ประกาศ/บทความ เน้น paraphrase + สแกน keyword) และ <b>Part 6</b> (เติมคำ/ประโยคลงในย่อหน้า ดูบริบทรอบช่องว่าง)
                </div>
                {/* Part 6 / 7 / mix selector */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 12.5, color: C.sub, marginBottom: 6 }}>เลือกแนวข้อสอบ</div>
                  <div style={{ display: "flex", background: "#efe7d7", borderRadius: 10, padding: 3, gap: 3 }}>
                    {[["part7", "Part 7", "จับใจความ"], ["part6", "Part 6", "เติมย่อหน้า"], ["mix", "รวม", "สลับ 6/7"]].map(([id, lbl, sub]) => {
                      const on = readType === id;
                      return (
                        <button key={id} onClick={() => chooseReadType(id)} disabled={st.generating}
                          style={{ flex: 1, border: "none", borderRadius: 8, padding: "8px 4px", fontSize: 12.5, fontWeight: 600, lineHeight: 1.25,
                            background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70", boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>
                          {lbl}<br /><span style={{ fontSize: 10, fontWeight: 400, opacity: .75 }}>{sub}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 12.5, color: C.sub, flex: "0 0 auto" }}>รุ่น AI:</span>
                  <div style={{ display: "flex", flex: 1, background: "#efe7d7", borderRadius: 10, padding: 3, gap: 3 }}>
                    {MODELS.map(mm => {
                      const on = models.listening === mm.id; const rec = RECOMMENDED.listening === mm.id;
                      return (
                        <button key={mm.id} onClick={() => chooseModel(mm.id)} disabled={st.generating}
                          style={{ flex: 1, border: "none", borderRadius: 8, padding: "7px 4px", fontSize: 12, fontWeight: 600, lineHeight: 1.25,
                            background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70", boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>
                          {mm.label}<br /><span style={{ fontSize: 10, fontWeight: 400, opacity: .75 }}>{rec ? "★ แนะนำ" : mm.note}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <button onClick={genPractice} disabled={st.generating}
                  style={{ width: "100%", background: st.generating ? "#d9a892" : (needsKey && !hasKey) ? "#b9b1a3" : C.accent, color: "#fff", border: "none", borderRadius: 13,
                    padding: "14px", fontSize: 15.5, fontWeight: 600, boxShadow: (needsKey && !hasKey) ? "none" : "0 8px 20px -10px rgba(191,77,40,.9)",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginBottom: 10 }}>
                  {st.generating
                    ? <><span className="spin" style={{ width: 16, height: 16, border: "2px solid #fff", borderTopColor: "transparent", borderRadius: "50%", display: "inline-block" }} /> กำลังสร้างชุดฝึก…</>
                    : (needsKey && !hasKey)
                    ? <>🔒 สร้างชุดใหม่ต้องใส่ API key</>
                    : <>✨ สร้างชุดฝึกอ่านใหม่ ({readType === "part6" ? "Part 6" : readType === "mix" ? "รวม 6/7" : "Part 7"})</>}
                </button>
                {st.genErr && <div style={{ color: C.red, fontSize: 12.5, marginBottom: 10, lineHeight: 1.5, wordBreak: "break-word", background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 9, padding: "8px 10px" }}>{st.genErr}</div>}
                {/* unified review zone (Reading): SRS-due primary, all-weak fallback */}
                {(() => {
                  let weak = 0;
                  for (const p of Object.values(st.data || {})) for (const q of (p.questions || [])) { const r = st.ratings[q.id]; if (r === "forgot" || r === "sort") weak++; }
                  const due = dueCountFor("listening");
                  if (!weak && !due) return null;
                  return (
                    <div style={{ border: `1px solid ${C.line}`, borderRadius: 13, padding: "12px 12px 13px", margin: "4px 0 14px", background: "#fcf8f0" }}>
                      <div style={{ fontSize: 12, color: C.sub, fontWeight: 700, marginBottom: 9 }}>
                        🔁 ทบทวน <span style={{ fontWeight: 400, fontSize: 11 }}>· ทวนข้อที่ใกล้ลืมมาก่อน</span>
                      </div>
                      {due > 0 ? (
                        <div style={{ display: "flex", gap: 8, alignItems: "stretch" }}>
                          <button onClick={buildReadingDue}
                            style={{ flex: weak > 0 ? 1.3 : 1, background: C.amberBg, color: C.ink, border: `1.5px solid ${C.amber}`, borderRadius: 11, padding: "12px 8px",
                              fontSize: 13.5, fontWeight: 700, lineHeight: 1.3 }}>
                            🔔 ถึงกำหนด ({due})
                          </button>
                          {weak > 0 && (
                            <button onClick={buildReadingReview}
                              style={{ flex: 1, background: "#fff", color: C.accent, border: `1.5px solid ${C.accentSoft}`, borderRadius: 11, padding: "12px 8px",
                                fontSize: 13, fontWeight: 600, lineHeight: 1.3 }}>
                              ยังไม่แม่น ({weak})
                            </button>
                          )}
                        </div>
                      ) : (
                        <>
                          <div style={{ fontSize: 12.5, color: C.green, fontWeight: 600, textAlign: "center", padding: "4px 0 9px" }}>
                            ✓ วันนี้ทบทวนครบแล้ว — ที่เหลือยังไม่ถึงกำหนด
                          </div>
                          {weak > 0 && (
                            <button onClick={buildReadingReview}
                              style={{ width: "100%", background: "#fff", color: C.accent, border: `1.5px solid ${C.accentSoft}`, borderRadius: 11, padding: "11px",
                                fontSize: 13.5, fontWeight: 600, display: "flex", alignItems: "center", justifyContent: "center", gap: 7 }}>
                              ทวนข้อที่ยังไม่แม่นทั้งหมด ({weak} ข้อ)
                            </button>
                          )}
                        </>
                      )}
                    </div>
                  );
                })()}
                {/* คลังข้อสอบ: passages saved from previous generations (never lost) */}
                {(() => {
                  // hide legacy/empty entries (no passage text or no questions) — they can't be replayed
                  let passages = Object.values(st.data || {})
                    .filter(p => p && p.transcript && (p.questions || []).length > 0)
                    .sort((a, b) => (b.gen || 0) - (a.gen || 0));
                  // filter the bank to the currently-selected part (รวม = show all)
                  const wantPart = readType === "part6" ? "Part 6" : readType === "part7" ? "Part 7" : null;
                  if (wantPart) passages = passages.filter(p => (p.ptype || "Part 7") === wantPart);
                  if (!passages.length) return null;
                  const scopeLbl = wantPart ? wantPart : "ทุกพาร์ท";
                  return (
                    <div style={{ marginTop: 4 }}>
                      <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>
                        📚 คลังข้อสอบที่เคยสร้าง · {scopeLbl} ({passages.length} ชุด) — แตะเพื่อทำซ้ำ
                      </div>
                      <div style={{ display: "grid", gap: 8 }}>
                        {passages.map(p => {
                          const preview = (p.transcript || "").replace(/\n/g, " ").slice(0, 70);
                          const nq = (p.questions || []).length;
                          let ok = 0; for (const q of (p.questions || [])) if (st.ratings[q.id] === "known") ok++;
                          return (
                            <div key={p.id} style={{ display: "flex", alignItems: "stretch", gap: 8, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 11, overflow: "hidden" }}>
                              <button onClick={() => playSavedReading(p.id)}
                                style={{ flex: 1, textAlign: "left", background: "none", border: "none", padding: "11px 13px", cursor: "pointer", minWidth: 0 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 4 }}>
                                  <span style={{ fontSize: 12, color: C.accent, fontWeight: 600 }}>{p.ptype || "Part 7"} · {nq} ข้อ{ok > 0 ? ` · เข้าใจ ${ok}/${nq}` : ""}</span>
                                  {p.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>{p.model}</span> : null}
                                </div>
                                <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.45 }}>{preview}…</div>
                              </button>
                              <ConfirmBtn onConfirm={() => deleteSavedReading(p.id)} idleLabel="🗑" confirmLabel="ลบ?"
                                style={{ flex: "0 0 auto", alignSelf: "center", marginRight: 8, padding: "8px 10px", fontSize: 13, borderRadius: 9 }} />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          }
          const done = v.pos >= v.deck.length;
          if (done && !v.end) {
            v.end = Date.now();
            if (!v.logged) { v.logged = true; let c = 0; v.deck.forEach(it => { if (v.picked[it.id] === it.answer) c++; }); logSession("listening", c, v.deck.length, realPart(v.ptype)); }
          }
          if (!done) {
            const item = v.deck[v.pos];
            const tx = v.transcript || item.transcript;
            const picked = v.picked[item.id];
            const revealed = !!picked;
            return (
              <div className="rise" key={v.pos}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, color: C.sub, marginBottom: 8 }}>
                  <span>{v.ptype} · ข้อ {v.pos + 1}/{v.deck.length}</span>
                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    {v.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>จาก {v.model}</span> : null}
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, background: C.accentSoft, color: C.accent,
                      fontWeight: 700, fontSize: 14, padding: "4px 11px", borderRadius: 20, fontVariantNumeric: "tabular-nums" }}>⏱ {fmtTime((v.end || now) - v.start)}</span>
                  </span>
                </div>
                <Progress pos={v.pos} len={v.deck.length} />
                {tx && (
                  <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 12, padding: "13px 15px", marginBottom: 12 }}>
                    <div style={{ fontSize: 10.5, letterSpacing: 1, textTransform: "uppercase", color: C.accent, fontWeight: 600, marginBottom: 6 }}>Passage (เนื้อเรื่องสำหรับอ่าน)</div>
                    <div style={{ fontSize: 14.5, color: C.ink, lineHeight: 1.7, whiteSpace: "pre-line" }}>{tx}</div>
                  </div>
                )}
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "18px 16px", boxShadow: "0 10px 30px -18px rgba(40,30,20,.4)" }}>
                  <div style={{ fontSize: 15.5, lineHeight: 1.5, fontWeight: 600, marginBottom: 14 }}>{item.q}</div>
                  <div style={{ display: "grid", gap: 9 }}>
                    {["A", "B", "C", "D"].map(k => {
                      if (!item.options[k]) return null;
                      const isAns = k === item.answer; const isPicked = k === picked;
                      let bg = "#fff", bd = C.line, fg = C.ink;
                      if (revealed) { if (isAns) { bg = C.greenBg; bd = C.green; } else if (isPicked) { bg = C.redBg; bd = C.red; } }
                      return (
                        <button key={k} className="opt" onClick={() => { chooseLQ(item.id, k); }} disabled={revealed}
                          style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "center", background: bg, border: `1.5px solid ${bd}`, color: fg, borderRadius: 11, padding: "12px 14px", fontSize: 15, lineHeight: 1.4 }}>
                          <span style={{ flex: "0 0 auto", width: 26, height: 26, borderRadius: 7,
                            background: revealed && isAns ? C.green : revealed && isPicked ? C.red : C.accentSoft,
                            color: revealed && (isAns || isPicked) ? "#fff" : C.accent, fontWeight: 700, fontSize: 13, display: "grid", placeItems: "center" }}>{k}</span>
                          <span>{item.options[k]}</span>
                          {revealed && isAns && <span style={{ marginLeft: "auto", color: C.green }}>✓</span>}
                          {revealed && isPicked && !isAns && <span style={{ marginLeft: "auto", color: C.red }}>✕</span>}
                        </button>
                      );
                    })}
                  </div>
                  {revealed && (
                    <div className="rise" style={{ marginTop: 14 }}>
                      <div style={{ fontWeight: 600, color: picked === item.answer ? C.green : C.red, marginBottom: 10 }}>
                        {picked === item.answer ? "ถูกต้อง! 🎉" : `ยังไม่ใช่ — คำตอบคือ ${item.answer}`}
                      </div>
                      {/* rating + next FIRST (same order as Grammar) so the user can rate & move on
                          without scrolling past a long explanation on mobile */}
                      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
                        <div style={{ flex: 1, minWidth: 200 }}>
                          <RatingRow mode="listening" current={st.ratings[item.id]} onRate={s => rateReading(item.id, s)} small />
                        </div>
                        <button onClick={nextLQ}
                          style={{ flex: "0 0 auto", background: C.accent, color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 15, fontWeight: 700, boxShadow: "0 6px 16px -8px rgba(191,77,40,.8)" }}>
                          {v.pos + 1 >= v.deck.length ? "จบ" : "→"}
                        </button>
                      </div>
                      <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 14px", fontSize: 14, lineHeight: 1.65 }}>
                        <b style={{ color: C.accent }}>อธิบาย:</b> {item.explain}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          }
          // summary
          let correct = 0; v.deck.forEach(it => { if (v.picked[it.id] === it.answer) correct++; });
          const n = v.deck.length; const totalMs = (v.end || now) - v.start; const pct = Math.round((correct / n) * 100);
          return (
            <div className="rise" style={{ textAlign: "center", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "26px 18px" }}>
              <div style={{ fontSize: 40 }}>🎉</div>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 24, fontWeight: 600, margin: "6px 0" }}>จบรอบนี้แล้ว!</div>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 46, fontWeight: 700, lineHeight: 1, color: C.accent }}>
                {correct}<span style={{ fontSize: 24, color: C.sub }}>/{n}</span>
              </div>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>ถูก {pct}%</div>
              <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap", margin: "16px 0 4px" }}>
                <Stat label="ถูก" value={correct} color={C.green} bg={C.greenBg} />
                <Stat label="ผิด" value={n - correct} color={C.red} bg={C.redBg} />
                <Stat label="เวลารวม" value={fmtTime(totalMs)} color={C.ink} bg="#efe7d7" />
              </div>
              {correct < n
                ? <div style={{ margin: "14px auto 0", maxWidth: 420, fontSize: 13, color: C.red, fontWeight: 600 }}>ข้อที่พลาดถูกเก็บเข้าคลังทวนแล้ว ✓</div>
                : <div style={{ margin: "14px auto 0", fontSize: 13.5, color: C.green, fontWeight: 600 }}>ถูกหมดเลย! 🌟</div>}
              <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                <button onClick={() => { setLquiz(null); genPractice(); }} disabled={st.generating}
                  style={{ flex: 1, background: (needsKey && !hasKey) ? "#b9b1a3" : C.accent, color: "#fff", border: "none", borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>{(needsKey && !hasKey) ? "🔒 ชุดใหม่" : "ชุดใหม่"}</button>
                <button onClick={() => setLquiz(null)}
                  style={{ flex: 1, background: "#fff", color: C.sub, border: `1.5px solid ${C.line}`, borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>ออก</button>
              </div>
            </div>
          );
        })()}

        {/* LISTENING(AUDIO) SUB-SWITCHER: strategy vs practice */}
        {mode === "audio" && (
          <div style={{ display: "flex", background: "#f0e7d5", borderRadius: 11, padding: 3, gap: 3, marginBottom: 14 }}>
            {[["strategy", "🧭 Strategy (เทคนิค)"], ["practice", "🎧 ฝึกฟัง (Part 2-4)"]].map(([id, lbl]) => {
              const on = aSection === id;
              return (
                <button key={id} onClick={() => setASection(id)}
                  style={{ flex: 1, border: "none", borderRadius: 9, padding: "9px 6px", fontSize: 13, fontWeight: 600,
                    background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70",
                    boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>{lbl}</button>
              );
            })}
          </div>
        )}

        {/* ===== LISTENING (AUDIO) · STRATEGY VIEW (fixed lessons + status) ===== */}
        {mode === "audio" && aSection === "strategy" && (() => {
          // ratings live on the listening(reading) mode so the shared "ทั่วไป"
          // cards keep one status across both tabs (same strat IDs).
          const st = M.current.listening;
          const items = stratFor(STRAT_LISTENING_PARTS);
          const shown = items.filter(x => { const s = st.ratings[x.id] || "new"; return aFilter === "all" || s === aFilter; });
          const cnt = items.reduce((a, x) => { const s = st.ratings[x.id]; if (!s) a.new++; else a[s]++; return a; }, { new: 0, forgot: 0, sort: 0, known: 0 });
          return (
            <div className="rise">
              <div style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.6, marginBottom: 12 }}>
                เทคนิคทำ <b>Listening</b> (Part 1-4) + เทคนิครวมที่ใช้ได้ทั้งฟังและอ่าน + กับดักที่เจอบ่อย — แตะเปิดอ่านทีละหัวข้อ แล้วมาร์คว่าเข้าใจแค่ไหน เก็บไว้ทวนเฉพาะที่ยังไม่แม่นได้
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", margin: "4px 0 12px" }}>
                {[["all", `ทั้งหมด ${items.length}`], ["forgot", `ยังไม่เข้าใจ ${cnt.forgot}`], ["sort", `พอเข้าใจ ${cnt.sort}`], ["known", `เข้าใจ ${cnt.known}`]].map(([id, lbl]) => (
                  <button key={id} onClick={() => setAFilter(id)}
                    style={{ border: `1px solid ${aFilter === id ? C.accent : C.line}`, background: aFilter === id ? C.accentSoft : "#fff",
                      color: aFilter === id ? C.accent : C.sub, borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 600 }}>{lbl}</button>
                ))}
              </div>
              <div style={{ display: "grid", gap: 9 }}>
                {shown.map((ls) => {
                  const open = openLesson === ls.id;
                  return (
                    <div key={ls.id} style={{ background: C.panel, border: `1px solid ${open ? C.accent : C.line}`, borderRadius: 12, overflow: "hidden" }}>
                      <button onClick={() => setOpenLesson(open ? null : ls.id)}
                        style={{ width: "100%", textAlign: "left", background: "none", border: "none", padding: "13px 14px", display: "flex", alignItems: "center", gap: 10 }}>
                        <span style={{ flex: "0 0 auto", fontSize: 10.5, color: C.accent, background: C.accentSoft, padding: "3px 8px", borderRadius: 9, fontWeight: 700 }}>{ls.part}</span>
                        <span style={{ flex: 1, fontWeight: 600, fontSize: 14.5, color: C.ink, lineHeight: 1.35 }}>{ls.title}</span>
                        <StatusBadge mode="listening" status={st.ratings[ls.id]} />
                        <span style={{ color: C.sub, fontSize: 18, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
                      </button>
                      {open && (
                        <div className="rise" style={{ padding: "0 14px 14px 14px" }}>
                          <div style={{ fontSize: 13, color: C.accent, fontWeight: 600, marginBottom: 8 }}>{ls.point}</div>
                          <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.7, marginBottom: 10 }}>{ls.body}</div>
                          {ls.examples && ls.examples.length > 0 && (
                            <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>

                {/* unified review zone (Listening): SRS-due primary, all-weak fallback */}
                {(() => {
                  let weak = 0;

                  const due = dueCountFor("audio");

                {/* คลังบทฟัง: clips saved from previous generations (never lost) */}

                  let clips = Object.values(st.data || {})
                    .filter(p => p && (p.questions || []).length > 0 && ((p.transcript && p.transcript.trim()) || p.ptype === "Part 2"))

            const tx = isP2
              ? [item.q, ...["A", "B", "C"].map(k => item.options[k] ? `${k}. ${item.options[k]}` : null).filter(Boolean)].join("\n")
              : (v.transcript || item.transcript);

                    <div className="rise" style={{ marginTop: 14 }}>

        {/* ===== TIMED MOCK EXAM ("สอบจริง") ===== */}
        {mode === "exam" && (() => {
          // ---- config screen (no active exam) ----

                </div>

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>

                  })}
                </div>
                <div style={{ fontSize: 11, color: C.sub, lineHeight: 1.5, marginBottom: 12, background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 8, padding: "7px 10px" }}>
                  ℹ️ ไม่มี Part 1 (Photographs) เพราะต้องใช้รูปภาพประกอบ ซึ่งแอปนี้สร้างเป็นข้อสอบจริงไม่ได้ — โฟกัส Part 2-7 ที่เป็นข้อความ/เสียงล้วน
                </div>
                <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 6 }}>หรือชุดรวม</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 14 }}>
                  {[["listening", "🎧 Listening รวม", "Part 2+3+4"], ["reading", "📖 Reading รวม", "Part 5+6+7"]].map(([id, lbl, sub]) => {
                    const on = examScope === id;
                    return (
                      <button key={id} onClick={() => setExamScope(id)}
                        style={{ textAlign: "left", border: on ? `2px solid ${C.accent}` : `1.5px solid ${C.line}`, background: on ? "#fff6f0" : "#fff", borderRadius: 11, padding: "10px 12px", lineHeight: 1.3 }}>
                        <div style={{ fontSize: 13.5, fontWeight: 700, color: on ? C.accent : C.ink }}>{lbl}</div>
                        <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>{sub}</div>
                      </button>
                    );
                  })}
                </div>
                <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", marginBottom: 14, fontSize: 13, color: C.ink, lineHeight: 1.6 }}>
                  ชุดนี้: <b>{plan.totalQ} ข้อ</b> · เวลา <b>{mins} นาที</b> · {plan.parts.join(" + ")}
                  <div style={{ fontSize: 11.5, color: C.sub, marginTop: 4 }}>ใช้รุ่น AI ของโหมด Listening ({mdlAudioLabel()}) · ระดับ {diffById(difficulty).label}</div>
                </div>
                {needsKey && !hasKey && <div style={{ fontSize: 12, color: C.red, background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 9, padding: "8px 10px", marginBottom: 10 }}>🔒 ต้องใส่ API key ก่อนจึงจะสร้างชุดสอบได้</div>}
                <button onClick={genExam} disabled={needsKey && !hasKey}
                  style={{ width: "100%", background: (needsKey && !hasKey) ? "#b9b1a3" : C.accent, color: "#fff", border: "none", borderRadius: 13, padding: "15px", fontSize: 16, fontWeight: 700, boxShadow: (needsKey && !hasKey) ? "none" : "0 8px 20px -10px rgba(191,77,40,.9)" }}>
                  ▶︎ เริ่มสอบ
                </button>
                <div style={{ fontSize: 11, color: C.sub, marginTop: 10, lineHeight: 1.5, textAlign: "center" }}>
                  หมดเวลาแล้วจะ <b>เตือน</b> แต่ยังทำต่อได้ — กด "ส่งคำตอบ" เมื่อพร้อม
                </div>

                {/* คลังชุดสอบที่เคยสร้าง — ทำซ้ำได้โดยไม่ต้องเจนใหม่ (ประหยัด token) */}
                {(() => {
                  const saved = Object.values(examBank || {}).sort((a, b) => (b.gen || 0) - (a.gen || 0));
                  if (!saved.length) return null;
                  return (
                    <div style={{ marginTop: 20, borderTop: `1px solid ${C.line}`, paddingTop: 16 }}>
                      <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>
                        🗂 ชุดสอบที่เคยสร้าง ({saved.length} ชุด) — แตะเพื่อทำซ้ำ ไม่ต้องเจนใหม่
                      </div>
                      <div style={{ display: "grid", gap: 8 }}>
                        {saved.map(ex => {
                          const mins = Math.round((ex.durationMs || 0) / 60000);
                          return (
                            <div key={ex.id} style={{ display: "flex", alignItems: "stretch", gap: 8, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 11, overflow: "hidden" }}>
                              <button onClick={() => replaySavedExam(ex.id)}
                                style={{ flex: 1, textAlign: "left", background: "none", border: "none", padding: "11px 13px", cursor: "pointer", minWidth: 0 }}>
                                <div style={{ fontSize: 13, color: C.accent, fontWeight: 700, marginBottom: 3 }}>{examScopeLabel(ex.scope)} · {ex.n} ข้อ · {mins} นาที</div>
                                <div style={{ fontSize: 11.5, color: C.sub, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{(ex.parts || []).join(" + ")}</div>
                              </button>
                              <ConfirmBtn onConfirm={() => deleteSavedExam(ex.id)} idleLabel="🗑" confirmLabel="ลบ?"
                                style={{ flex: "0 0 auto", alignSelf: "center", marginRight: 8, padding: "8px 10px", fontSize: 13, borderRadius: 9 }} />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          }
          // ---- building (generating sets) ----
          if (exam.building) {
            return (
              <div className="rise" style={{ textAlign: "center", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "30px 18px" }}>
                <div className="spin" style={{ width: 30, height: 30, border: "3px solid " + C.accentSoft, borderTopColor: C.accent, borderRadius: "50%", margin: "0 auto 14px" }} />
                <div style={{ fontWeight: 700, fontSize: 16, color: C.ink }}>กำลังสร้างชุดสอบ…</div>
                {examGen && <div style={{ fontSize: 13, color: C.sub, marginTop: 6 }}>ชุดที่ {examGen.current}/{examGen.total}</div>}
                <div style={{ fontSize: 11.5, color: C.sub, marginTop: 10, lineHeight: 1.5 }}>สร้างหลายพาร์ทอาจใช้เวลาสักครู่ — รอสักนิดนะครับ</div>
                <button onClick={quitExam} style={{ marginTop: 16, background: "#fff", color: C.sub, border: `1.5px solid ${C.line}`, borderRadius: 11, padding: "10px 18px", fontSize: 13.5, fontWeight: 600 }}>ยกเลิก</button>
              </div>
            );
          }
          // ---- gen error ----
          if (exam.genErr) {
            return (
              <div className="rise" style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "22px 18px" }}>
                <div style={{ color: C.red, fontSize: 13.5, lineHeight: 1.6, background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>{exam.genErr}</div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={genExam} style={{ flex: 1, background: C.accent, color: "#fff", border: "none", borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>ลองใหม่</button>
                  <button onClick={quitExam} style={{ flex: 1, background: "#fff", color: C.sub, border: `1.5px solid ${C.line}`, borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>ออก</button>
                </div>
              </div>
            );
          }
          // ---- report (submitted) ----
          if (exam.submitted) {
            let correct = 0; exam.deck.forEach(it => { if (exam.picked[it.id] === it.answer) correct++; });
            const n = exam.deck.length; const pct = Math.round((correct / n) * 100);
            const answered = Object.keys(exam.picked).length;
            // per-part breakdown
            const byPart = {};
            for (const it of exam.deck) {
              const p = it._ptype;
              if (!byPart[p]) byPart[p] = { part: p, c: 0, n: 0 };
              byPart[p].n++; if (exam.picked[it.id] === it.answer) byPart[p].c++;
            }
            const ORDER = ["Part 2", "Part 3", "Part 4", "Part 5", "Part 6", "Part 7"];
            const rows = Object.values(byPart).sort((a, b) => ORDER.indexOf(a.part) - ORDER.indexOf(b.part));
            return (
              <div className="rise">
                <div style={{ textAlign: "center", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "24px 18px", marginBottom: 14 }}>
                  <div style={{ fontSize: 38 }}>🏁</div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 600, margin: "4px 0" }}>ส่งข้อสอบแล้ว!</div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 44, fontWeight: 700, lineHeight: 1, color: C.accent }}>{correct}<span style={{ fontSize: 22, color: C.sub }}>/{n}</span></div>
                  <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>ถูก {pct}% · ตอบ {answered}/{n} ข้อ</div>
                  {answered < n && <div style={{ fontSize: 12, color: C.amber, fontWeight: 600, marginTop: 4 }}>มี {n - answered} ข้อที่ไม่ได้ตอบ (นับเป็นผิด)</div>}
                </div>
                {rows.length > 1 && (
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>คะแนนรายพาร์ท</div>
                    <div style={{ display: "grid", gap: 8, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px" }}>
                      {rows.map((r, i) => {
                        const p = Math.round((r.c / r.n) * 100);
                        const col = p >= 80 ? C.green : p >= 60 ? C.amber : C.red;
                        return (
                          <div key={i}>
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 3 }}>
                              <span style={{ color: C.ink, fontWeight: 600 }}>{r.part}</span>
                              <span style={{ color: col, fontWeight: 700 }}>{p}% <span style={{ color: C.sub, fontWeight: 400 }}>· {r.c}/{r.n}</span></span>
                            </div>
                            <div style={{ height: 7, borderRadius: 4, background: "#efe7d7", overflow: "hidden" }}><div style={{ height: "100%", width: `${p}%`, background: col }} /></div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {/* per-question review */}
                <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>เฉลยรายข้อ</div>
                <div style={{ display: "grid", gap: 10, marginBottom: 14 }}>
                  {exam.deck.map((it, i) => {
                    const picked = exam.picked[it.id];
                    const ok = picked === it.answer;
                    return (
                      <div key={it.id} style={{ background: C.panel, border: `1px solid ${ok ? C.green : C.red}`, borderRadius: 12, padding: "12px 14px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 11, color: C.accent, fontWeight: 700 }}>ข้อ {i + 1} · {it._ptype}</span>
                          <span style={{ fontSize: 12, fontWeight: 700, color: ok ? C.green : C.red }}>{ok ? "ถูก ✓" : picked ? "ผิด ✕" : "ไม่ได้ตอบ"}</span>
                        </div>
                        {it.transcript ? <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.6, whiteSpace: "pre-line", marginBottom: 6, maxHeight: 120, overflow: "auto", background: "#fbf6ec", borderRadius: 8, padding: "8px 10px" }}>{it.transcript}</div> : null}
                        <div style={{ fontSize: 14, fontWeight: 600, color: C.ink, marginBottom: 6 }}>{it._ptype === "Part 2" ? "เลือกคำตอบที่เหมาะที่สุด" : it.q}</div>
                        <div style={{ display: "grid", gap: 5 }}>
                          {["A", "B", "C", "D"].map(k => {
                            if (!it.options[k]) return null;
                            const isAns = k === it.answer, isPicked = k === picked;
                            return (
                              <div key={k} style={{ display: "flex", gap: 8, fontSize: 13, color: isAns ? C.green : isPicked ? C.red : C.ink, fontWeight: (isAns || isPicked) ? 700 : 400 }}>
                                <span>{k}.</span><span>{it.options[k]}</span>
                                {isAns && <span style={{ marginLeft: "auto" }}>✓</span>}
                                {isPicked && !isAns && <span style={{ marginLeft: "auto" }}>✕</span>}
                              </div>
                            );
                          })}
                        </div>
                        {it.explain && <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.55, marginTop: 8, background: "#fbf6ec", borderRadius: 8, padding: "8px 10px" }}><b style={{ color: C.accent }}>อธิบาย:</b> {it.explain}</div>}
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={quitExam} style={{ flex: 1, background: C.accent, color: "#fff", border: "none", borderRadius: 11, padding: "13px", fontSize: 15, fontWeight: 700 }}>สอบชุดใหม่</button>
                </div>
              </div>
            );
          }
          // ---- in progress ----
          const it = exam.deck[exam.pos];
          const picked = exam.picked[it.id];
          const elapsed = now - exam.start;
          const remain = exam.durationMs - elapsed;
          const overtime = remain <= 0;
          const answered = Object.keys(exam.picked).length;
          const showTx = it.transcript && (it._ptype !== "Part 2"); // Part 2 has no shared passage
          const p2text = it._ptype === "Part 2";
          return (
            <div className="rise">
              {/* sticky-ish header: timer + progress */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <span style={{ fontSize: 13, color: C.sub }}>{exam.parts.join("+")} · ข้อ {exam.pos + 1}/{exam.deck.length}</span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: overtime ? C.redBg : C.accentSoft, color: overtime ? C.red : C.accent,
                  fontWeight: 700, fontSize: 15, padding: "5px 13px", borderRadius: 20, fontVariantNumeric: "tabular-nums" }}>
                  ⏱ {fmtTime(Math.abs(remain))}{overtime ? " เกิน" : ""}
                </span>
              </div>
              {overtime && <div style={{ fontSize: 12.5, color: C.red, fontWeight: 600, background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 9, padding: "8px 12px", marginBottom: 10 }}>⏰ หมดเวลาแล้ว — ทำต่อได้ แต่ในสนามจริงจะหมดเวลาพอดี กด "ส่งคำตอบ" เมื่อพร้อมครับ</div>}

              {/* question grid (jump to any item; colored = answered) */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginBottom: 12 }}>
                {exam.deck.map((d, i) => {
                  const ans = !!exam.picked[d.id]; const cur = i === exam.pos;
                  return (
                    <button key={d.id} onClick={() => examGoto(i)}
                      style={{ width: 26, height: 26, borderRadius: 7, fontSize: 11, fontWeight: 700,
                        border: cur ? `2px solid ${C.accent}` : `1px solid ${C.line}`,
                        background: ans ? C.accentSoft : "#fff", color: ans ? C.accent : C.sub }}>{i + 1}</button>
                  );
                })}
              </div>

              {(showTx || p2text) && (
                <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                    <span style={{ fontSize: 10.5, letterSpacing: 1, textTransform: "uppercase", color: C.accent, fontWeight: 600 }}>{EXAM_PARTS[it._ptype] && EXAM_PARTS[it._ptype].skill === "listening" ? "🎧 ฟังแล้วตอบ" : "📖 อ่านแล้วตอบ"}</span>
                    {EXAM_PARTS[it._ptype] && EXAM_PARTS[it._ptype].skill === "listening" && TTS_OK && (
                      <button onClick={(e) => speak(p2text ? [it.q, ...["A","B","C"].map(k => it.options[k] ? `${k}. ${it.options[k]}` : null).filter(Boolean)].join("\n") : it.transcript, e)}
                        style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 20, padding: "7px 14px", fontSize: 13, fontWeight: 700 }}>🔊 เล่นเสียง</button>
                    )}
                  </div>
                  <button onClick={() => examToggleReveal(it.id)} style={{ background: "none", border: "none", color: C.sub, fontSize: 12, marginTop: 8, textDecoration: "underline", padding: 0 }}>
                    {exam.reveal[it.id] ? "ซ่อนข้อความ ▴" : (p2text ? "เผยข้อความ ▾" : "ดูข้อความ ▾")}
                  </button>
                  {exam.reveal[it.id] && <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.7, whiteSpace: "pre-line", marginTop: 8 }}>{p2text ? it.q : it.transcript}</div>}
                </div>
              )}

              <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "16px 16px", boxShadow: "0 10px 30px -18px rgba(40,30,20,.4)" }}>
                {!p2text && <div style={{ fontSize: 15, lineHeight: 1.5, fontWeight: 600, marginBottom: 12 }}>{it.q}</div>}
                {p2text && <div style={{ fontSize: 13.5, color: C.sub, fontWeight: 600, marginBottom: 12 }}>เลือกคำตอบที่ตอบรับได้เป็นธรรมชาติที่สุด</div>}
                <div style={{ display: "grid", gap: 8 }}>
                  {["A", "B", "C", "D"].map(k => {
                    if (!it.options[k]) return null;
                    const sel = k === picked;
                    return (
                      <button key={k} className="opt" onClick={() => pickExam(it.id, k)}
                        style={{ textAlign: "left", display: "flex", gap: 11, alignItems: "center", background: sel ? "#fff6f0" : "#fff", border: `1.5px solid ${sel ? C.accent : C.line}`, color: C.ink, borderRadius: 11, padding: "11px 13px", fontSize: 14.5, lineHeight: 1.4 }}>
                        <span style={{ flex: "0 0 auto", width: 25, height: 25, borderRadius: 7, background: sel ? C.accent : C.accentSoft, color: sel ? "#fff" : C.accent, fontWeight: 700, fontSize: 12.5, display: "grid", placeItems: "center" }}>{k}</span>
                        <span>{p2text && !exam.reveal[it.id] ? <span style={{ color: C.sub, fontStyle: "italic" }}>ตัวเลือก {k}</span> : it.options[k]}</span>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* nav + submit */}
              <div style={{ display: "flex", gap: 8, marginTop: 14, alignItems: "center" }}>
                <button onClick={() => examGoto(exam.pos - 1)} disabled={exam.pos === 0}
                  style={{ background: "#fff", color: exam.pos === 0 ? C.line : C.sub, border: `1.5px solid ${C.line}`, borderRadius: 10, padding: "11px 16px", fontSize: 14, fontWeight: 600 }}>← ก่อนหน้า</button>
                {exam.pos + 1 < exam.deck.length
                  ? <button onClick={() => examGoto(exam.pos + 1)} style={{ flex: 1, background: C.accent, color: "#fff", border: "none", borderRadius: 10, padding: "11px", fontSize: 14.5, fontWeight: 700 }}>ถัดไป →</button>
                  : <span style={{ flex: 1 }} />}
              </div>
              <ConfirmBtn onConfirm={submitExam} idleLabel={`📤 ส่งคำตอบ (ตอบแล้ว ${answered}/${exam.deck.length})`} confirmLabel="ยืนยันส่ง? กดอีกครั้ง"
                style={{ width: "100%", marginTop: 10, background: C.green, color: "#fff", border: "none", borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 700 }} />
              <button onClick={quitExam} style={{ width: "100%", marginTop: 8, background: "none", color: C.sub, border: "none", fontSize: 12.5, textDecoration: "underline" }}>ออกจากข้อสอบ (ไม่บันทึก)</button>
            </div>
          );
        })()}

        {/* ===== DRILL / VOCAB AREA (gen, stats, tabs, cards) ===== */}
        {!(mode === "grammar" && gSection === "lesson") && !(mode === "vocab" && vSection === "quiz") && mode !== "listening" && mode !== "audio" && mode !== "exam" && (
          <>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12, fontSize: 13, color: C.sub }}>
          <span>สร้างไปแล้ว <b style={{ color: C.accent, fontSize: 15 }}>{distinctGenCount(st.data)}</b> ชุด</span>
          <span style={{ color: C.line }}>•</span>
          <span>{mode === "vocab" ? "คำสะสม" : "ข้อสะสม"} <b style={{ color: C.ink }}>{total}</b></span>
        </div>

        {/* model picker (per mode, remembers choice) — always expanded so picking is one tap */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <span style={{ fontSize: 12.5, color: C.sub, flex: "0 0 auto" }}>รุ่น AI:</span>
          <div style={{ display: "flex", flex: 1, background: "#efe7d7", borderRadius: 10, padding: 3, gap: 3 }}>
            {MODELS.map(mm => {
              const on = models[mode] === mm.id;
              const rec = RECOMMENDED[mode] === mm.id;
              return (
                <button key={mm.id} onClick={() => chooseModel(mm.id)} disabled={st.generating}
                  style={{ position: "relative", flex: 1, border: "none", borderRadius: 8, padding: "7px 4px", fontSize: 12, fontWeight: 600, lineHeight: 1.25,
                    background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70",
                    boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>
                  {mm.label}<br /><span style={{ fontSize: 10, fontWeight: 400, opacity: .75 }}>{rec ? "★ แนะนำ" : mm.note}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* generate */}
        <button onClick={generate} disabled={st.generating}
          style={{ width: "100%", background: st.generating ? "#d9a892" : (needsKey && !hasKey) ? "#b9b1a3" : C.accent, color: "#fff", border: "none", borderRadius: 13,
            padding: "14px 18px", fontSize: 15.5, fontWeight: 600, boxShadow: (needsKey && !hasKey) ? "none" : "0 8px 20px -10px rgba(191,77,40,.9)",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginBottom: 10 }}>
          {st.generating ? (
            <><span className="spin" style={{ width: 16, height: 16, border: "2px solid #fff", borderTopColor: "transparent", borderRadius: "50%", display: "inline-block" }} /> กำลังสร้าง{mode === "vocab" ? "คำ" : "ข้อ"}ใหม่…</>
          ) : (needsKey && !hasKey) ? (
            <>🔒 สร้างชุดใหม่ต้องใส่ API key</>
          ) : (
            <>✨ สุ่ม{mode === "vocab" ? "คำ" : "ข้อ"}ชุดใหม่ ({BATCH[mode]} {mode === "vocab" ? "คำ" : "ข้อ"})</>
          )}
        </button>
        {/* VOCAB: study the curated static bank by level — no AI/key needed */}
        {mode === "vocab" && !st.generating && (

// hand-drawn SVG line chart (no chart library, so it works identically in the
// artifact build and the standalone HTML build).
function MiniLineChart({ series, color }) {
  const W = 460, H = 150, padL = 30, padR = 10, padT = 12, padB = 22;
  const ys = series.map(p => p.y);
  // zoom the Y axis to the data range (with padding) instead of always starting at 0,
  // so a high-but-slowly-rising line (e.g. mastered words) shows real movement.
  const lo = Math.min(...ys), hi = Math.max(...ys);
  const span = hi - lo;
  const pad = span > 0 ? Math.max(1, Math.round(span * 0.2)) : Math.max(1, Math.round(hi * 0.05) || 1);
  let yMin = Math.max(0, lo - pad), yMax = hi + pad;
  if (yMin >= yMax) { yMin = Math.max(0, lo - 1); yMax = hi + 1; }
  const n = series.length;
  const xAt = i => padL + (n === 1 ? 0 : (i * (W - padL - padR)) / (n - 1));
  const yAt = v => padT + (H - padT - padB) * (1 - (v - yMin) / (yMax - yMin));
  const line = series.map((p, i) => `${i === 0 ? "M" : "L"}${xAt(i).toFixed(1)},${yAt(p.y).toFixed(1)}`).join(" ");
  const area = `${line} L${xAt(n - 1).toFixed(1)},${(H - padB).toFixed(1)} L${xAt(0).toFixed(1)},${(H - padB).toFixed(1)} Z`;
  const ticks = [yMin, Math.round((yMin + yMax) / 2), yMax];
  // label a few x positions only, to avoid clutter
  const labelEvery = Math.max(1, Math.ceil(n / 6));
  return (
    <div style={{ background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: "8px 6px 4px" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
        {ticks.map((t, i) => (
          <g key={i}>
            <line x1={padL} y1={yAt(t)} x2={W - padR} y2={yAt(t)} stroke={C.line} strokeWidth="1" />
            <text x={padL - 5} y={yAt(t) + 3} textAnchor="end" fontSize="9" fill={C.sub}>{t}</text>
          </g>
        ))}
        <path d={area} fill={color} opacity="0.12" />
        <path d={line} fill="none" stroke={color} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round" />
        {series.map((p, i) => (
          <circle key={i} cx={xAt(i)} cy={yAt(p.y)} r={n > 20 ? 1.6 : 2.6} fill={color} />
        ))}
        {series.map((p, i) => (i % labelEvery === 0 || i === n - 1) ? (
          <text key={"x" + i} x={xAt(i)} y={H - 7} textAnchor="middle" fontSize="8.5" fill={C.sub}>{p.x}</text>
        ) : null)}
      </svg>
    </div>
  );
}

// shared weakness-by-topic card (grammar topics / reading parts / listening parts)
function WeaknessCard({ title, items, hint }) {
  if (!items || !items.length) return null;
  const top = items.slice(0, 6);
  const maxTotal = Math.max(...top.map(t => t.total), 1);
  return (
    <div style={{ marginTop: 18 }}>
      <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>{title}</div>
      <div style={{ display: "grid", gap: 8, background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px 12px" }}>
        {top.map((t, i) => {
          const pctKnown = Math.round((t.known / t.total) * 100);
          return (
            <div key={i}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, marginBottom: 3 }}>
                <span style={{ fontSize: 13, color: C.ink, fontWeight: 600, lineHeight: 1.3 }}>{t.topic}</span>
                <span style={{ fontSize: 11, color: t.weak > 0 ? C.red : C.green, fontWeight: 700, flex: "0 0 auto" }}>
                  {t.weak > 0 ? `ยังไม่แม่น ${t.weak}/${t.total}` : `แม่นครบ ${t.total}`}
                </span>
              </div>
              <div style={{ height: 7, borderRadius: 4, background: C.redBg, overflow: "hidden", width: `${Math.max(28, (t.total / maxTotal) * 100)}%` }}>
                <div style={{ height: "100%", width: `${pctKnown}%`, background: C.green }} />
              </div>
            </div>
          );
        })}
      </div>
      {hint && <div style={{ fontSize: 11, color: C.sub, marginTop: 6, lineHeight: 1.5 }}>{hint}</div>}
    </div>
  );
}

          <span style={{ position: "absolute", right: 0, top: -14, fontSize: 9, color: C.green, fontWeight: 700 }}>80%</span>

        <div style={{ display: "flex", alignItems: "flex-end", gap: 5, height: "100%" }}>

            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }} title={it.value + "%"}>
              <span style={{ fontSize: 9, color: C.sub, marginBottom: 2 }}>{it.value}</span>
              <div style={{ width: "100%", maxWidth: 26, height: `${Math.max(3, it.value)}%`, background: it.color, borderRadius: "4px 4px 0 0" }} />

      <div style={{ borderTop: `1px solid ${C.line}`, marginTop: 2, paddingTop: 4, textAlign: "center", fontSize: 10, color: C.sub }}>เก่า → ใหม่</div>

}

        return (

            style={{ border: `1.5px solid ${on ? S[s].color : C.line}`, background: on ? S[s].bg : "#fff",

              padding: small ? "8px 4px" : (big ? "11px 6px" : "10px 6px"), fontSize: small ? 12.5 : 13.5, fontWeight: 600 }}>
            {small ? S[s].short : S[s].label}
          </button>

      })}

  );
}

function Centered({ children }) {

// tap-once shows "แน่ใจ? ลบเลย"; tap-again confirms. auto-reverts after 3s so a stray tap is harmless.
function ConfirmBtn({ onConfirm, idleLabel, confirmLabel, style }) {
  const [armed, setArmed] = React.useState(false);
  React.useEffect(() => {
    if (!armed) return;
    const t = setTimeout(() => setArmed(false), 3000);
    return () => clearTimeout(t);
  }, [armed]);
  const base = { borderRadius: 8, padding: "5px 11px", fontSize: 12.5, fontWeight: 600, border: "1px solid", whiteSpace: "nowrap" };
  return (
    <button
      onClick={(e) => { e.stopPropagation(); if (armed) { setArmed(false); onConfirm(); } else { setArmed(true); } }}
      style={{ ...base,
        background: armed ? C.red : C.greenBg, color: armed ? "#fff" : C.green,
        borderColor: armed ? C.red : C.green, ...(style || {}) }}>
      {armed ? (confirmLabel || "แน่ใจ? ลบเลย") : (idleLabel || "✓ จำได้แล้ว")}
    </button>
  );
}
