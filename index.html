// React, useState, useEffect, useRef come from global React (loaded via CDN in the HTML wrapper)

// ============================================================

//  - "standalone" mode: file is a regular .html opened in a browser

// ============================================================
const IS_ARTIFACT = typeof window !== "undefined" && !!window.storage;

// Unified async storage adapter. Both branches return Promises so the
// rest of the app can `await` consistently regardless of environment.
const STORAGE = IS_ARTIFACT
  ? {
      async get(k) { try { const r = await window.storage.get(k); return r && r.value != null ? r.value : null; } catch (e) { return null; } },
      async set(k, v) { try { await window.storage.set(k, v); return true; } catch (e) { return false; } },
    }
  : {
      async get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
      async set(k, v) { try { localStorage.setItem(k, v); return true; } catch (e) { return false; } },
    };

// ---- warm editorial palette ----

// ============================================================
//  AI ENGINE REGISTRY
//  Each engine is self-contained: its models, recommended picks,
//  where its API key lives, the help text for getting a key, and
//  a call() that does the fetch + DETAILED error handling and
//  returns the raw text. Add a new provider by adding one entry.
// ============================================================
const ENGINES = {
  gemini: {
    id: "gemini",
    name: "Gemini",
    icon: "⚡",
    color: "#1a73e8",
    keyStorage: "toeic_gemini_key_v1",
    keyPrefix: "AIza…",
    keyUrl: "https://aistudio.google.com/app/apikey",
    keyUrlLabel: "aistudio.google.com/app/apikey",
    keyLogin: "ล็อกอินด้วยบัญชี Google",
    keyCreate: 'กด "Create API key" แล้วก๊อปคีย์มา',
    models: [
      { id: "flash25", label: "Flash 2.5", str: "gemini-2.5-flash", note: "สมดุล", supportsThinking: false },
      { id: "pro25", label: "Pro 2.5", str: "gemini-2.5-pro", note: "ฉลาดสุด", supportsThinking: false },
      { id: "flashlite25", label: "Flash-Lite 2.5", str: "gemini-2.5-flash-lite", note: "เร็ว/เบา", supportsThinking: false },
    ],
    recommended: { vocab: "flashlite25", grammar: "flash25", listening: "flash25" },
    thinkingModes: [], // Gemini-side thinking control not implemented yet
    async call({ model, maxTokens, prompt, key }) {
      const url = "https://generativelanguage.googleapis.com/v1beta/models/" + encodeURIComponent(model) + ":generateContent";

        res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-goog-api-key": key },
          body: JSON.stringify({
            contents: [{ role: "user", parts: [{ text: prompt }] }],

      }
      if (!res.ok) {
        let body = ""; try { body = await res.text(); } catch (e) {}
        let hint = "";
        if (res.status === 400) hint = " (key อาจไม่ถูกต้อง หรือคำสั่งผิดรูปแบบ)";
        else if (res.status === 401 || res.status === 403) hint = " (API key ไม่ถูกต้อง/ยังไม่เปิดใช้ — เช็กที่ Google AI Studio)";
        else if (res.status === 429) hint = " (เรียกถี่เกินโควต้า รอสักพักแล้วลองใหม่)";

        throw new Error("Gemini ตอบสถานะ " + res.status + hint + (body ? (": " + body.slice(0, 300)) : ""));
      }
      let data; try { data = await res.json(); } catch (e) { throw new Error("อ่านคำตอบ Gemini ไม่ได้ (ไม่ใช่ JSON)"); }
      if (data && data.error) throw new Error("Gemini error: " + ((data.error.message || JSON.stringify(data.error)) + "").slice(0, 300));
      const cand = (data.candidates && data.candidates[0]) || null;
      if (!cand) throw new Error("Gemini ไม่ส่ง candidate กลับมา — raw: " + JSON.stringify(data).slice(0, 200));
      if (cand.finishReason && cand.finishReason !== "STOP" && cand.finishReason !== "MAX_TOKENS") {
        throw new Error("Gemini หยุดผิดปกติ (finishReason=" + cand.finishReason + ") — อาจโดน safety filter หรือ quota");
      }
      const parts = (cand.content && cand.content.parts) || [];
      return parts.map(p => p && p.text ? p.text : "").join("");
    },
  },

  claude: {
    id: "claude",
    name: "Claude",
    icon: "🧠",
    color: "#c15f3c",
    keyStorage: "toeic_claude_key_v1",
    keyPrefix: "sk-ant-…",
    keyUrl: "https://console.anthropic.com/settings/keys",
    keyUrlLabel: "console.anthropic.com/settings/keys",
    keyLogin: "ล็อกอิน/สมัครบัญชี Anthropic (ต้องเติมเครดิตขั้นต่ำเพื่อใช้ API)",
    keyCreate: 'กด "Create Key" แล้วก๊อปคีย์มา',
    models: [
      // Sonnet and Opus support Anthropic's Adaptive thinking; Haiku does not
      { id: "sonnet46", label: "Sonnet 4.6", str: "claude-sonnet-4-6", note: "สมดุล", supportsThinking: true },
      { id: "opus48", label: "Opus 4.8", str: "claude-opus-4-8", note: "ฉลาดสุด", supportsThinking: true },

    recommended: { vocab: "haiku45", grammar: "sonnet46", listening: "sonnet46" },
    // which app modes are eligible for the thinking toggle (vocab is excluded — gains too little)

      }
      if (!res.ok) {
        let body = ""; try { body = await res.text(); } catch (e) {}

        if (res.status === 401) hint = " (API key ไม่ถูกต้อง — เช็กที่ console.anthropic.com)";
        else if (res.status === 400) hint = " (คำสั่งผิดรูปแบบ หรือชื่อโมเดลไม่ถูก)";
        else if (res.status === 403) hint = " (key ไม่มีสิทธิ์ใช้โมเดลนี้)";
        else if (res.status === 429) hint = " (เรียกถี่เกินโควต้า/เครดิตหมด รอสักพักหรือเติมเครดิต)";
        else if (res.status >= 500) hint = " (ฝั่ง Anthropic ขัดข้องชั่วคราว ลองใหม่ใน 1-2 นาที)";

      let data; try { data = await res.json(); } catch (e) { throw new Error("อ่านคำตอบ Claude ไม่ได้ (ไม่ใช่ JSON)"); }

      // When adaptive thinking is on, content can include "thinking" / "redacted_thinking" blocks alongside "text" blocks.
      // We only want the final user-facing text — explicitly filter by type.
      return (data.content || [])
        .filter(b => b && b.type === "text" && typeof b.text === "string")
        .map(b => b.text)
        .join("");
    },
  },

  // ==== artifact-only engine ====

  artifact: {

      { id: "haiku45", label: "Haiku 4.5", str: "claude-haiku-4-5-20251001", note: "เร็ว/เบา", supportsThinking: false },
    ],

    async call({ model, maxTokens, prompt, thinking }) {
      const body = { model, max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] };
      let res;

      }

      if (data && data.type === "error") throw new Error("Claude error: " + ((data.error && data.error.message ? data.error.message : JSON.stringify(data.error)) + "").slice(0, 300));
      return (data.content || [])
        .filter(b => b && b.type === "text" && typeof b.text === "string")
        .map(b => b.text)
        .join("");

};

// Engines actually available in the current environment.

  ? { artifact: ENGINES.artifact }
  : { gemini: ENGINES.gemini, claude: ENGINES.claude };

const ENGINE_KEY = "toeic_engine_v1"; // persists which engine is selected
const MODEL_KEY = "toeic_models_v2"; // persists chosen model per mode, PER engine: { gemini:{...}, claude:{...} }

const BACKUP_PREFIX = "TZv1:"; // marks a compressed backup string

// ============================================================
//  DIFFICULTY LEVELS

function diffById(id) { return DIFFICULTIES.find(d => d.id === id) || DIFFICULTIES[DIFFICULTIES.length - 1]; }


// Load pako (gzip) from CDN once; resolve to the lib or null if unavailable.
let _pakoPromise = null;
function loadPako() {
  if (typeof window !== "undefined" && window.pako) return Promise.resolve(window.pako);
  if (_pakoPromise) return _pakoPromise;
  _pakoPromise = new Promise((resolve) => {
    try {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js";
      s.onload = () => resolve(window.pako || null);
      s.onerror = () => resolve(null);
      document.head.appendChild(s);
    } catch (e) { resolve(null); }
  });
  return _pakoPromise;
}
// bytes -> base64 (chunked to avoid call-stack limits on big arrays)
function bytesToB64(bytes) {
  let bin = "";
  const CH = 0x8000;
  for (let i = 0; i < bytes.length; i += CH) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CH));
  }
  return btoa(bin);
}
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
// --- backup integrity: a tiny deterministic checksum so a damaged file/string is
//     DETECTED on import instead of failing silently or loading partial data ---
function fnv1a(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 0x01000193); }
  return (h >>> 0).toString(16).padStart(8, "0");
}
// build the SAME canonical string at export-time and import-time, independent of JSON
// key order, so the checksum verifies the actual data payload (not formatting).
function canonicalBackup(obj) {
  const v = obj.vocab || {}, g = obj.grammar || {}, l = obj.listening || {};
  return JSON.stringify([
    obj.day,
    v.words, v.ratings, v.genCount, v.missQ,
    g.items, g.ratings, g.genCount,
    l.lessons, l.ratings, l.genCount, l.missQ,
  ]);
}

// compress a JSON string -> "TZv1:<base64>"; falls back to raw JSON if pako missing
async function compressBackup(jsonStr) {
  const pako = await loadPako();
  if (!pako) return jsonStr; // graceful fallback: plain JSON (still works on import)
  try {
    const packed = pako.deflate(jsonStr);
    return BACKUP_PREFIX + bytesToB64(packed);
  } catch (e) { return jsonStr; }
}
// accept either a compressed ("TZv1:...") or plain-JSON backup string -> JSON string
async function decompressBackup(text) {
  const t = (text || "").trim();
  if (!t.startsWith(BACKUP_PREFIX)) return t; // old/plain backup
  const pako = await loadPako();
  if (!pako) throw new Error("no-pako");
  const bytes = b64ToBytes(t.slice(BACKUP_PREFIX.length));
  return pako.inflate(bytes, { to: "string" });
}

// ---- per-engine API key helpers (browser storage only — never sent anywhere except the provider) ----
// NB: these are sync wrappers over localStorage when in standalone (key UI is sync). In artifact mode
// the engine doesn't need a key, so getKey/setKey are no-ops for the artifact engine.
async function getStoredEngine() {
  try { const e = await STORAGE.get(ENGINE_KEY); return e && AVAILABLE_ENGINES[e] ? e : DEFAULT_ENGINE; } catch (e) { return DEFAULT_ENGINE; }
}
function setStoredEngine(id) {
  try { if (AVAILABLE_ENGINES[id]) STORAGE.set(ENGINE_KEY, id); } catch (e) {}
}
function getKey(engineId) {
  try {
    const eng = ENGINES[engineId];
    if (!eng || !eng.keyStorage) return ""; // artifact engine has no key
    return (localStorage.getItem(eng.keyStorage) || "").trim();
  } catch (e) { return ""; }
}
function setKey(engineId, k) {
  try {
    const eng = ENGINES[engineId];
    if (!eng || !eng.keyStorage) return;
    localStorage.setItem(eng.keyStorage, (k || "").trim());
  } catch (e) {}
}

// ---- shared AI call: routes to the chosen engine. Returns CLEANED text; throws DETAILED error so the UI shows WHY it failed ----
async function aiComplete({ engineId, model, maxTokens, prompt }) {
  const eng = ENGINES[engineId];
  if (!eng) throw new Error("ไม่รู้จัก engine: " + engineId);
  let key = "";
  if (eng.keyStorage) {
    key = getKey(engineId);
    if (!key) throw new Error("ยังไม่ได้ใส่ " + eng.name + " API key — กดปุ่ม ⚙️ ด้านบนเพื่อใส่ key ก่อนครับ");
  }
  const raw = await eng.call({ model, maxTokens, prompt, key }); // each engine throws its own detailed errors
  const text = (raw || "").replace(/```json/gi, "").replace(/```/g, "").trim();
  if (!text) throw new Error(eng.name + " ไม่ส่งเนื้อหากลับมา (content ว่าง) — ลองกดใหม่อีกครั้ง");
  return text;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function vocabPrompt(avoidWords, category, diffPrompt) {
  const avoid = avoidWords.length
    ? `\nDo NOT include any of these words the learner already has: ${avoidWords.slice(-150).join(", ")}.`
    : "";
  const diff = diffPrompt ? `\n${diffPrompt}` : "";
  return `You are a TOEIC vocabulary coach for a Thai learner (target 850+).
Generate EXACTLY ${BATCH.vocab} NEW English vocabulary words.
THEME for this batch: "${category}". Choose words that genuinely fit this theme.${diff}
Choose words that match the target difficulty above and that commonly appear on the TOEIC Listening & Reading test.${avoid}
For EACH word provide:
- "w": the word in lowercase
- "pos": part of speech, abbreviated (e.g. "n.", "v.", "adj.", "adv.")
- "ipa": IPA pronunciation in slashes
- "th": the Thai meaning (in Thai script)
- "def": a simple English definition, under 12 words
- "ex": one natural example sentence in a business or daily context
Respond with ONLY a valid minified JSON array of ${BATCH.vocab} objects, no markdown, no backticks, no preamble.
Shape: [{"w":"...","pos":"...","ipa":"...","th":"...","def":"...","ex":"..."}]`;
}

function grammarPrompt(avoidStems, category, diffPrompt) {
  const avoid = avoidStems.length
    ? `\nDo NOT reuse or closely resemble these recent question stems: ${avoidStems.slice(-40).map(s => `"${s}"`).join("; ")}.`
    : "";
  const diff = diffPrompt ? `\n${diffPrompt}` : "";
  return `You are a TOEIC Part 5 item writer for a Thai learner (target 850+).
Generate EXACTLY 5 TOEIC Listening&Reading Part 5-style multiple-choice grammar/vocabulary questions.
Each question: ONE sentence with a single blank shown as "____". Set the sentences in this CONTEXT/THEME: "${category}".
Across the 5 questions, COVER A VARIETY of high-yield grammar points commonly tested on TOEIC, especially: verb tense, subject-verb agreement, prepositions, articles, conjunctions/transition words, word forms (noun/verb/adjective/adverb), pronouns, comparatives/superlatives, and relative clauses.${diff}
For EACH question provide:
- "q": the sentence containing one "____"
- "options": object with keys "A","B","C","D"
- "answer": the correct key ("A"|"B"|"C"|"D")
- "point": the grammar point in THAI, short (e.g. "กาล (tense)", "คำบุพบท", "รูปคำ", "คำเชื่อม")
- "explain": a THAI explanation, 1-3 sentences, why the answer is correct AND why one key distractor is wrong
Respond with ONLY a valid minified JSON array of 5 objects, no markdown, no backticks, no preamble.
Shape: [{"q":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","point":"...","explain":"..."}]`;
}

function listeningPracticePrompt(category, diffPrompt) {
  const types = [
    "an EMAIL or letter (with a subject line and greeting)",
    "a NOTICE or announcement",
    "an ADVERTISEMENT or job posting",
    "a memo or short article",
    "a text-message / online-chat exchange between 2 people",
  ];
  const kind = types[Math.floor(Math.random() * types.length)];
  const diff = diffPrompt ? `\n${diffPrompt}` : "";
  return `You are a TOEIC Part 7 (Reading Comprehension) item writer for a Thai learner (target 850+).
Write ${kind} as a realistic TOEIC Part 7 reading passage, 90-150 words. Set it in this CONTEXT/THEME: "${category}". Use natural written business/daily English.${diff}
Then write EXACTLY 3 multiple-choice comprehension questions about it (TOEIC Part 7 style: main idea/purpose, specific detail, inference, or vocabulary-in-context).
IMPORTANT: at least 2 of the 3 correct answers must use PARAPHRASE (different words from the passage), since real TOEIC answers rarely copy the exact wording.
For EACH question provide:
- "q": the question in English
- "options": object with keys "A","B","C","D" (English, plausible distractors)
- "answer": the correct key ("A"|"B"|"C"|"D")
- "explain": a THAI explanation, 1-2 sentences: why the answer is right and which clue in the passage proves it
Respond with ONLY a valid minified JSON object, no markdown, no backticks, no preamble.
Shape: {"ptype":"Part 7","transcript":"...(the full passage; use \\n for line breaks)...","questions":[{"q":"...","options":{"A":"...","B":"...","C":"...","D":"..."},"answer":"A","explain":"..."}]}`;
}

// blank state per mode

function fmtTime(ms) {
  if (ms == null || ms < 0) ms = 0;
  const s = Math.round(ms / 1000);
  const mm = Math.floor(s / 60);
  const ss = s % 60;
  return `${mm}:${String(ss).padStart(2, "0")}`;
}

function App() {
  const [mode, setMode] = useState("vocab"); // 'vocab' | 'grammar'

  const [confirmReset, setConfirmReset] = useState(false);
  const [engine, setEngineState] = useState(DEFAULT_ENGINE); // overwritten from storage on mount
  // model choice is stored PER engine (each engine has its own list of model IDs)
  const [modelsByEngine, setModelsByEngine] = useState(() => {

  const [keyTick, setKeyTick] = useState(0); // bump to recompute key presence after save/delete
  const [keyDraft, setKeyDraft] = useState(""); // draft value in the settings input

  // ---- derived values for the CURRENT engine (recomputed every render) ----
  const ENG = ENGINES[engine] || ENGINES[DEFAULT_ENGINE]; // current engine object
  const MODELS = ENG.models;                              // current engine's selectable models
  const RECOMMENDED = ENG.recommended;                    // current engine's recommended picks
  const models = modelsByEngine[engine] || RECOMMENDED;   // current engine's chosen models { vocab, grammar, listening }
  // eslint-disable-next-line no-unused-vars
  const _keyDep = keyTick;                                // referencing keyTick so hasKey recomputes when it changes
  const needsKey = !!ENG.keyStorage;                      // does this engine need an API key?
  const hasKey = needsKey ? !!getKey(engine) : true;      // artifact engine: no key needed → treat as "has key"

  // on mount: restore selected engine, then pop settings if that engine needs a key it doesn't have
  useEffect(() => {
    (async () => {

    setStoredEngine(id);
    setEngineState(id);

    setKeyTick(t => t + 1);
    const eng = ENGINES[id];
    if (eng && eng.keyStorage && !getKey(id)) setShowSettings(true);
  }

  // tick every second while a grammar session is actively running
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);

  // both modes live in a ref; we re-render manually so switching is instant
  const M = useRef({ vocab: emptyMode(), grammar: emptyMode(), listening: emptyMode() });
  const cardAreaRef = useRef(null); // scroll target for the study card/deck area
  function scrollToCards() {
    // wait a tick so the deck has rendered, then bring it into view
    setTimeout(() => { try { cardAreaRef.current && cardAreaRef.current.scrollIntoView({ behavior: "smooth", block: "start" }); } catch (e) {} }, 60);
  }

  const [gSection, setGSection] = useState("drill"); // grammar: 'lesson' | 'drill'
  const [openLesson, setOpenLesson] = useState(null); // index of expanded lesson
  const [vSection, setVSection] = useState("cards"); // vocab: 'cards' | 'quiz'
  const [lSection, setLSection] = useState("strategy"); // listening: 'strategy' | 'practice'
  const [lquiz, setLquiz] = useState(null); // listening practice: { ptype, transcript, model, deck, pos, picked, start, end }
  const [lFilter, setLFilter] = useState("all"); // listening strategy filter
  const [gLessonFilter, setGLessonFilter] = useState("all"); // grammar lesson status filter

  useEffect(() => {

      try {

          try {

          } catch (e) { /* no data for this mode */ }
        }
        // first-launch consistency: if the user has NO saved model prefs and NO saved difficulty,
        // seed the recommended model + thinking from the DEFAULT difficulty (Near-native) so the
        // app doesn't start at "Near-native" while quietly using the cheap default models.
        let savedModelsRaw = null, savedDiffRaw = null;
        try { savedModelsRaw = await STORAGE.get(MODEL_KEY); } catch (e) {}
        try { savedDiffRaw = await STORAGE.get(DIFF_KEY); } catch (e) {}
        if (savedModelsRaw) {
          try {
            const saved = JSON.parse(savedModelsRaw) || {};
            setModelsByEngine(prev => {
              const next = { ...prev };
              for (const eid of Object.keys(ENGINES)) {
                const list = ENGINES[eid].models;
                const rec = ENGINES[eid].recommended;
                const sv = (saved && saved[eid]) || {};
                next[eid] = {
                  vocab: list.some(x => x.id === sv.vocab) ? sv.vocab : rec.vocab,
                  grammar: list.some(x => x.id === sv.grammar) ? sv.grammar : rec.grammar,
                  listening: list.some(x => x.id === sv.listening) ? sv.listening : rec.listening,
                };
              }
              return next;
            });
          } catch (e) { /* bad saved model prefs */ }
        } else if (!savedDiffRaw) {
          // brand-new user → apply default difficulty's recommendation across all engines
          const d = diffById(DEFAULT_DIFFICULTY);
          setModelsByEngine(prev => {
            const next = { ...prev };
            for (const eid of Object.keys(ENGINES)) {
              const recModel = (d.rec && d.rec[eid]);
              if (recModel && ENGINES[eid].models.some(x => x.id === recModel)) {
                next[eid] = { vocab: recModel, grammar: recModel, listening: recModel };
              }
            }
            return next;
          });
        }
        try {
          const rdiff = await STORAGE.get(DIFF_KEY);
          if (rdiff) { const id = JSON.parse(rdiff); if (DIFFICULTIES.some(d => d.id === id)) setDifficultyState(id); }
        } catch (e) { /* no saved difficulty */ }
        try {
          const rd = await STORAGE.get(DAY_KEY);
          if (rd) { const d = parseInt(JSON.parse(rd), 10); if (!isNaN(d) && d >= 0) setDayCount(d); }
        } catch (e) { /* no saved day */ }
      } finally { setLoaded(true); }
    })();
  }, []);

  function chooseModel(id) {
    setModelsByEngine(prev => {
      const next = { ...prev, [engine]: { ...prev[engine], [mode]: id } };
      STORAGE.set(MODEL_KEY, JSON.stringify(next));
      return next;
    });
  }


  // choose a difficulty level. Auto-applies the recommended model (for the CURRENT engine,
  // across all 3 modes) and the recommended thinking on/off (for thinking-eligible modes).
  function applyDifficulty(id) {
    const d = diffById(id);
    setDifficultyState(id);
    STORAGE.set(DIFF_KEY, JSON.stringify(id));

    // recommended model for the current engine (fall back to the engine's own recommended)
    const recModel = (d.rec && d.rec[engine]) || RECOMMENDED[mode];
    if (recModel && MODELS.some(x => x.id === recModel)) {
      setModelsByEngine(prev => {
        const next = { ...prev, [engine]: { vocab: recModel, grammar: recModel, listening: recModel } };
        STORAGE.set(MODEL_KEY, JSON.stringify(next));
        return next;
      });
    }
  }

  function changeDay(delta) {
    setDayCount(prev => {
      const next = Math.max(0, prev + delta);
      STORAGE.set(DAY_KEY, JSON.stringify(next));
      return next;
    });
  }

  // open backup modal; for export, fill text asynchronously (compression is async)
  async function openBackup(kind) {
    if (kind === "export") {
      setBackup({ kind: "export", text: "กำลังเตรียมข้อมูล…", msg: null });
      const t = await exportData();
      setBackup(b => (b && b.kind === "export" ? { ...b, text: t } : b));
    } else {
      setBackup({ kind: "import", text: "", msg: null });
    }
  }

  const cur = () => M.current[mode];

  async function persist(m) {
    const st = M.current[m];
    const payload = m === "vocab"
      ? { words: st.data, ratings: st.ratings, genCount: st.genCount, missQ: st.missQ }
      : m === "listening"
      ? { lessons: st.data, ratings: st.ratings, genCount: st.genCount, missQ: st.missQ }
      : { items: st.data, ratings: st.ratings, genCount: st.genCount };
    const ok = await STORAGE.set(STORAGE_KEY[m], JSON.stringify(payload));
    if (!ok) setStorageOk(false);
  }

  async function generate() {
    const m = mode, st = cur();
    st.generating = true; st.genErr = null; st.lastAdded = null; rerender();
    try {
      const avoid = m === "vocab"
        ? Object.keys(st.data)
        : Object.values(st.data).map(x => x.q);
      const category = pickCategory();
      const mdl = MODELS.find(x => x.id === models[m]) || MODELS[0];
      const diffP = diffById(difficulty).prompt;
      const prompt = m === "vocab" ? vocabPrompt(avoid, category, diffP) : grammarPrompt(avoid, category, diffP);
      // adaptive thinking applies only to grammar (never vocab), AND only when engine+model support it AND user toggled it on
      const clean = await aiComplete({ engineId: engine, model: mdl.str, maxTokens: m === "vocab" ? 4000 : 3000, prompt });
      let arr;
      try { arr = JSON.parse(clean); }
      catch (pe) { throw new Error("แปลงคำตอบเป็น JSON ไม่ได้ — AI ตอบมาว่า: " + clean.slice(0, 200)); }
      if (!Array.isArray(arr) || !arr.length) throw new Error("bad shape");

      const newGen = st.genCount + 1;
      const nextData = { ...st.data };
      const fresh = [];
      if (m === "vocab") {
        for (const item of arr) {
          if (!item || !item.w) continue;
          const key = String(item.w).toLowerCase().trim();
          if (nextData[key]) continue;
          const obj = { w: key, pos: item.pos || "", ipa: item.ipa || "", th: item.th || "", def: item.def || "", ex: item.ex || "", gen: newGen, model: mdl.label };
          nextData[key] = obj; fresh.push(obj);
        }
      } else {
        arr.forEach((it, i) => {
          if (!it || !it.q || !it.options || !it.answer) return;
          const id = `g${newGen}-${i}-${Math.random().toString(36).slice(2, 6)}`;
          const obj = { id, q: it.q, options: it.options, answer: it.answer, point: it.point || "", explain: it.explain || "", gen: newGen, model: mdl.label };
          nextData[id] = obj; fresh.push(obj);
        });
      }
      st.data = nextData; st.genCount = newGen;
      st.deck = shuffle(fresh); st.pos = 0; st.flipped = false; st.pickedMap = {};
      st.tab = "study"; st.lastAdded = fresh.length; st.lastCategory = category;
      if (m === "grammar") { st.startTime = Date.now(); st.endTime = null; }
      await persist(m);
    } catch (e) {
      st.genErr = "สร้างชุดใหม่ไม่สำเร็จ — " + (e && e.message ? e.message : String(e));
    } finally {
      st.generating = false; rerender();
      if (!st.genErr) scrollToCards();
    }
  }

  function buildReviewDeck() {
    const st = cur();
    const all = Object.values(st.data);
    const key = m => (st.data[m]); // unused
    const idOf = x => (mode === "vocab" ? x.w : x.id);
    const forgot = all.filter(x => st.ratings[idOf(x)] === "forgot");
    const sort = all.filter(x => st.ratings[idOf(x)] === "sort");
    const built = shuffle([...forgot.slice(0, 20), ...sort.slice(0, 10)]);
    st.deck = built; st.pos = 0; st.flipped = false; st.pickedMap = {}; st.tab = "study";
    if (mode === "grammar") { st.startTime = Date.now(); st.endTime = null; }
    rerender();
    scrollToCards();
  }

  function rate(id, status, advance) {
    const st = cur();
    st.ratings = { ...st.ratings, [id]: status };
    persist(mode);
    if (advance) { st.flipped = false; st.pos = Math.min(st.pos + 1, st.deck.length); }
    rerender();
  }

  function choose(id, key) {
    const st = cur();
    if (st.pickedMap[id]) return;
    st.pickedMap = { ...st.pickedMap, [id]: key };
    rerender();
  }

  // ---- Vocab Quiz (cloze / fill-in-the-sentence only) ----
  function makeClozeItem(word, pool, idx, idPrefix) {
    const letters = ["A", "B", "C", "D"];
    const safe = word.w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp("\\b" + safe + "\\b", "i");
    const prompt = word.ex.replace(re, "____");
    const others = shuffle(pool.filter(x => x.w !== word.w)).slice(0, 3).map(x => x.w);
    const opts = shuffle([word.w, ...others]);
    return {
      id: idPrefix + idx, prompt, options: { A: opts[0], B: opts[1], C: opts[2], D: opts[3] },
      answer: letters[opts.indexOf(word.w)], word: word.w, th: word.th, model: word.model || "",
    };
  }
  function buildVocabQuiz() {
    const all = Object.values(M.current.vocab.data);
    // cloze needs the word to appear in its own example sentence
    const usable = all.filter(w => w.ex && new RegExp("\\b" + w.w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\b", "i").test(w.ex));
    if (usable.length < 4) { setVquiz({ deck: [], pos: 0, picked: {}, start: null, end: null, tooFew: true }); return; }
    const picks = shuffle(usable).slice(0, Math.min(10, usable.length));
    const deck = picks.map((w, i) => makeClozeItem(w, all, i, "vq"));
    setVquiz({ deck, pos: 0, picked: {}, start: Date.now(), end: null, isReview: false });
  }
  function buildMissedQuiz() {
    const missed = Object.values(M.current.vocab.missQ || {});
    if (!missed.length) return;
    // re-shuffle options each review attempt
    const deck = shuffle(missed).map((q, i) => {
      const letters = ["A", "B", "C", "D"];
      const correctText = q.options[q.answer];
      const opts = shuffle(Object.values(q.options));
      return { ...q, id: "rv" + i, options: { A: opts[0], B: opts[1], C: opts[2], D: opts[3] }, answer: letters[opts.indexOf(correctText)] };
    });
    setVquiz({ deck, pos: 0, picked: {}, start: Date.now(), end: null, isReview: true });
  }
  function chooseQuiz(id, key) {
    setVquiz(v => (v.picked[id] ? v : { ...v, picked: { ...v.picked, [id]: key } }));
  }
  function nextQuiz() {

  // ---- Reading: Practice (Part 7 passage + questions, timed) ----
  async function genPractice() {
    const st = M.current.listening;
    st.generating = true; st.genErr = null; rerender();
    try {
      const category = pickCategory();
      const mdl = MODELS.find(x => x.id === models.listening) || MODELS[0];
      const clean = await aiComplete({ engineId: engine, model: mdl.str, maxTokens: 2500, prompt: listeningPracticePrompt(category, diffById(difficulty).prompt) });
      let obj;
      try { obj = JSON.parse(clean); }
      catch (pe) { throw new Error("แปลงคำตอบเป็น JSON ไม่ได้ — AI ตอบมาว่า: " + clean.slice(0, 200)); }
      if (!obj || !obj.transcript || !Array.isArray(obj.questions) || !obj.questions.length) throw new Error("bad shape");
      const ptype = obj.ptype || "Part 7";
      const passageId = "rp" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
      const deck = obj.questions.filter(q => q && q.q && q.options && q.answer).map((q, i) => ({
        id: passageId + "-q" + i,
        q: q.q, options: q.options, answer: q.answer, explain: q.explain || "",
      }));
      // SAVE the whole passage to the persistent bank (so a generated reading is never lost —
      // it cost tokens to make). Stored as one bank entry keyed by passageId, holding the
      // passage text + its questions. The bank powers "คลังข้อสอบ" and review-by-rating.
      st.data = { ...st.data, [passageId]: { id: passageId, transcript: obj.transcript, ptype, model: mdl.label, questions: deck, gen: Date.now(), category } };
      await persist("listening");
      setLquiz({ passageId, ptype, transcript: obj.transcript, model: mdl.label, deck, pos: 0, picked: {}, start: Date.now(), end: null });
    } catch (e) {
      st.genErr = "สร้างชุดฝึกอ่านไม่สำเร็จ — " + (e && e.message ? e.message : String(e));
    } finally { st.generating = false; rerender(); }
  }
  // replay a saved passage from the bank (for คลังข้อสอบ / review)
  function playSavedReading(passageId) {
    const st = M.current.listening;
    const p = st.data[passageId];
    if (!p) return;
    const deck = (p.questions || []).map(q => ({ ...q }));
    setLquiz({ passageId, ptype: p.ptype || "Part 7", transcript: p.transcript, model: p.model || "", deck, pos: 0, picked: {}, start: Date.now(), end: null });
    setLSection("practice");
  }
  // delete a saved passage from the bank (and drop its questions' ratings)
  function deleteSavedReading(passageId) {
    const st = M.current.listening;
    const p = st.data[passageId];
    const nextData = { ...st.data }; delete nextData[passageId];
    const nextRatings = { ...st.ratings };
    if (p && p.questions) for (const q of p.questions) delete nextRatings[q.id];
    st.data = nextData; st.ratings = nextRatings;
    persist("listening"); rerender();
  }
  // rate a single reading question (เข้าใจ/ไม่เข้าใจ) — same model as grammar ratings
  function rateReading(qid, status) {
    const st = M.current.listening;
    st.ratings = { ...st.ratings, [qid]: status };
    persist("listening"); rerender();
  }
  function chooseLQ(id, key) { setLquiz(v => (v.picked[id] ? v : { ...v, picked: { ...v.picked, [id]: key } })); }
  function nextLQ() { setLquiz(v => ({ ...v, pos: Math.min(v.pos + 1, v.deck.length) })); }
  // build a review deck from Reading questions the user rated "forgot"/"sort" (not yet mastered),
  // pulling them straight out of the saved passage bank — same logic as Grammar review.
  function buildReadingReview() {
    const st = M.current.listening;
    const due = [];
    for (const p of Object.values(st.data || {})) {
      for (const q of (p.questions || [])) {
        const r = st.ratings[q.id];
        if (r === "forgot" || r === "sort") due.push({ ...q, _transcript: p.transcript, _ptype: p.ptype });
      }
    }
    if (!due.length) return;
    const deck = shuffle(due);
    // review shows each question with its own passage (grouped review)
    setLquiz({ passageId: null, ptype: "ทวนข้อที่ยังไม่แม่น", transcript: null, model: "", deck: deck.map(q => ({ ...q, transcript: q._transcript })), pos: 0, picked: {}, start: Date.now(), end: null, isReview: true });
    setLSection("practice");
  }

  // ---- backup / restore (export/import the whole app state as a portable text blob) ----
  function buildBackupJson() {
    const payload = {
      _toeic_trainer: 1,
      day: dayCount,
      vocab: { words: M.current.vocab.data, ratings: M.current.vocab.ratings, genCount: M.current.vocab.genCount, missQ: M.current.vocab.missQ },
      grammar: { items: M.current.grammar.data, ratings: M.current.grammar.ratings, genCount: M.current.grammar.genCount },
      listening: { lessons: M.current.listening.data, ratings: M.current.listening.ratings, genCount: M.current.listening.genCount, missQ: M.current.listening.missQ },
    };
    payload._checksum = fnv1a(canonicalBackup(payload)); // integrity tag (verified on import)
    return JSON.stringify(payload);
  }
  // returns compressed backup string (or raw JSON if pako unavailable)
  async function exportData() {
    return await compressBackup(buildBackupJson());
  }
  // save backup as a downloadable .json file (resilient: no copy-paste char loss)
  function downloadBackup() {
    try {
      const json = buildBackupJson(); // plain, human-readable JSON with checksum inside
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      // fixed filename (no date/day) so each save REPLACES the previous file instead of
      // piling up many copies in the downloads folder. The newest data is always in toeic-backup.json.
      const a = document.createElement("a");
      a.href = url;
      a.download = "toeic-backup.json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      setBackup(b => (b ? { ...b, msg: "บันทึกไฟล์ toeic-backup.json แล้ว ✓ (ทับไฟล์เดิม ไม่กองหลายไฟล์)" } : b));
    } catch (e) {
      setBackup(b => (b ? { ...b, msg: "บันทึกไฟล์อัตโนมัติไม่ได้ — ใช้วิธีก๊อปข้อความด้านล่างแทนได้ครับ" } : b));
    }
  }
  // human-readable length helper for the char-count badges
  const fmtLen = n => (n || 0).toLocaleString("en-US");

  // mode="overwrite" (default) replaces everything; mode="merge" keeps existing data + ratings
  // and only ADDS new words/items/lessons from the backup (so studied progress isn't lost).
  async function importData(text, mode = "overwrite") {
    let jsonStr;
    try { jsonStr = await decompressBackup(text); }
    catch (e) { return "คลายโค้ดบีบอัดไม่สำเร็จ (เชื่อมเน็ตแล้วลองใหม่ หรือโค้ดไม่ครบ)"; }
    let obj;
    try { obj = JSON.parse((jsonStr || "").trim()); } catch (e) { return "โค้ดไม่ถูกต้อง (อ่านไม่ได้)"; }
    if (!obj || !obj._toeic_trainer) return "โค้ดนี้ไม่ใช่ข้อมูลของแอปนี้";
    // integrity check: if the backup carries a checksum, make sure data isn't damaged
    if (obj._checksum) {
      const calc = fnv1a(canonicalBackup(obj));
      if (calc !== obj._checksum) return "ไฟล์/โค้ดสำรองนี้เสียหาย (checksum ไม่ตรง) — ข้อมูลถูกแก้หรือไม่ครบ จึงไม่กู้คืนเพื่อกันข้อมูลพัง";
    }
    const isMerge = mode === "merge";
    // merge rule for the data/ratings maps:
    //  - data:    existing entries WIN (keep what's already there), incoming adds only new keys
    //  - ratings: existing ratings WIN (don't clobber studied progress with backup's older state)
    const mergeMap = (existing, incoming, existingWins) =>
      existingWins ? { ...(incoming || {}), ...(existing || {}) } : { ...(existing || {}), ...(incoming || {}) };
    try {
      if (obj.vocab) {
        M.current.vocab.data = isMerge ? mergeMap(M.current.vocab.data, obj.vocab.words, true) : (obj.vocab.words || {});
        M.current.vocab.ratings = isMerge ? mergeMap(M.current.vocab.ratings, obj.vocab.ratings, true) : (obj.vocab.ratings || {});
        M.current.vocab.genCount = isMerge ? Math.max(M.current.vocab.genCount || 0, obj.vocab.genCount || 0) : (obj.vocab.genCount || 0);
        M.current.vocab.missQ = isMerge ? mergeMap(M.current.vocab.missQ, obj.vocab.missQ, true) : (obj.vocab.missQ || {});
        M.current.vocab.deck = []; M.current.vocab.pos = 0; M.current.vocab.pickedMap = {};
        await persist("vocab");
      }
      if (obj.grammar) {
        M.current.grammar.data = isMerge ? mergeMap(M.current.grammar.data, obj.grammar.items, true) : (obj.grammar.items || {});
        M.current.grammar.ratings = isMerge ? mergeMap(M.current.grammar.ratings, obj.grammar.ratings, true) : (obj.grammar.ratings || {});
        M.current.grammar.genCount = isMerge ? Math.max(M.current.grammar.genCount || 0, obj.grammar.genCount || 0) : (obj.grammar.genCount || 0);
        M.current.grammar.deck = []; M.current.grammar.pos = 0; M.current.grammar.pickedMap = {};
        await persist("grammar");
      }
      if (obj.listening) {
        M.current.listening.data = isMerge ? mergeMap(M.current.listening.data, obj.listening.lessons, true) : (obj.listening.lessons || {});
        M.current.listening.ratings = isMerge ? mergeMap(M.current.listening.ratings, obj.listening.ratings, true) : (obj.listening.ratings || {});
        M.current.listening.genCount = isMerge ? Math.max(M.current.listening.genCount || 0, obj.listening.genCount || 0) : (obj.listening.genCount || 0);
        M.current.listening.missQ = isMerge ? mergeMap(M.current.listening.missQ, obj.listening.missQ, true) : (obj.listening.missQ || {});
        M.current.listening.deck = []; M.current.listening.pos = 0; M.current.listening.pickedMap = {};
        await persist("listening");
      }
      if (typeof obj.day === "number" && obj.day >= 0) {
        const nextDay = isMerge ? Math.max(dayCount || 0, obj.day) : obj.day; // merge keeps the higher day count
        setDayCount(nextDay);
        STORAGE.set(DAY_KEY, JSON.stringify(nextDay));
      }
      rerender();
      return null; // success
    } catch (e) { return "กู้คืนไม่สำเร็จ ลองตรวจโค้ดอีกครั้ง"; }
  }

  // Read the clipboard directly via the JS API. This bypasses the mobile <textarea>
  // paste limit (~20,000 chars) that silently truncates a long pasted code, because the
  // text never goes through a paste event — we get the full string and set it ourselves.
  async function pasteFromClipboard() {
    try {
      if (!navigator.clipboard || !navigator.clipboard.readText) {
        setBackup(b => ({ ...b, msg: "เบราว์เซอร์นี้ไม่รองรับวางอัตโนมัติ — แตะในกล่องแล้ววางเองได้ครับ" }));
        return;
      }
      const txt = await navigator.clipboard.readText();
      if (!txt || !txt.trim()) {
        setBackup(b => ({ ...b, msg: "คลิปบอร์ดว่าง — ไปกดก๊อปโค้ดสำรองก่อนนะครับ" }));
        return;
      }
      setBackup(b => ({ ...b, text: txt, msg: `วางอัตโนมัติแล้ว ${fmtLen(txt.length)} ตัวอักษร ✓ (ครบไม่ติด limit)` }));
    } catch (e) {

    }
  }

                        <span style={{ flex: 1, fontWeight: 600, fontSize: 14.5, color: C.ink, lineHeight: 1.35 }}>{ls.title}</span>

                        <span style={{ color: C.sub, fontSize: 18, transform: open ? "rotate(180deg)" : "none", transition: "transform .2s" }}>⌄</span>
                      </button>
                      {open && (

                            </div>

                            <div style={{ display: "flex", gap: 8, alignItems: "flex-start", background: C.redBg, borderRadius: 10, padding: "10px 12px", marginBottom: 10 }}>

                            </div>
                          )}
                          <RatingRow mode="listening" current={st.ratings[ls.id]} onRate={s => rate(ls.id, s, false)} small />
                        </div>
                      )}
                    </div>
                  );
                })}
                {shown.length === 0 && <Centered>ไม่มีบทเรียนในหมวดนี้</Centered>}
              </div>
            </div>
          );
        })()}

        {/* ===== LISTENING · PRACTICE VIEW ===== */}
        {mode === "listening" && lSection === "practice" && (() => {
          const st = M.current.listening;
          const v = lquiz;
          const missCount = Object.keys(st.missQ || {}).length;
          if (!v) {
            return (
              <div className="rise">
                <div style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.6, marginBottom: 12 }}>
                  ฝึก <b>อ่านจับใจความ</b> แนว <b>Part 7</b> (อีเมล ประกาศ โฆษณา บทความ) แล้วตอบคำถามจับเวลา — เน้นการ <b>paraphrase</b> (คำตอบมักไม่ใช้คำเดิมในเรื่อง) และการสแกนหา keyword เหมือนข้อสอบจริง
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                  <span style={{ fontSize: 12.5, color: C.sub, flex: "0 0 auto" }}>รุ่น AI:</span>
                  <div style={{ display: "flex", flex: 1, background: "#efe7d7", borderRadius: 10, padding: 3, gap: 3 }}>
                    {MODELS.map(mm => {
                      const on = models.listening === mm.id; const rec = RECOMMENDED.listening === mm.id;
                      return (
                        <button key={mm.id} onClick={() => chooseModel(mm.id)} disabled={st.generating}
                          style={{ flex: 1, border: "none", borderRadius: 8, padding: "7px 4px", fontSize: 12, fontWeight: 600, lineHeight: 1.25,
                            background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70", boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>
                          {mm.label}<br /><span style={{ fontSize: 10, fontWeight: 400, opacity: .75 }}>{rec ? "★ แนะนำ" : mm.note}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>

                <button onClick={genPractice} disabled={st.generating}
                  style={{ width: "100%", background: st.generating ? "#d9a892" : C.accent, color: "#fff", border: "none", borderRadius: 13,
                    padding: "14px", fontSize: 15.5, fontWeight: 600, boxShadow: "0 8px 20px -10px rgba(191,77,40,.9)",
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginBottom: 10 }}>
                  {st.generating
                    ? <><span className="spin" style={{ width: 16, height: 16, border: "2px solid #fff", borderTopColor: "transparent", borderRadius: "50%", display: "inline-block" }} /> กำลังสร้างชุดฝึก…</>
                    : <>✨ สร้างชุดฝึกอ่านใหม่ (Part 7)</>}
                </button>
                {st.genErr && <div style={{ color: C.red, fontSize: 12.5, marginBottom: 10, lineHeight: 1.5, wordBreak: "break-word", background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 9, padding: "8px 10px" }}>{st.genErr}</div>}
                {(() => {
                  // count Reading questions rated not-yet-mastered (forgot/sort) across the whole bank
                  let due = 0;
                  for (const p of Object.values(st.data || {})) for (const q of (p.questions || [])) { const r = st.ratings[q.id]; if (r === "forgot" || r === "sort") due++; }
                  if (!due) return null;
                  return (
                    <button onClick={buildReadingReview}
                      style={{ width: "100%", background: "#fff", color: C.accent, border: `1.5px solid ${C.accentSoft}`, borderRadius: 13, padding: "11px", fontSize: 14, fontWeight: 600, margin: "4px 0 14px" }}>
                      🔁 ทวนข้อที่ยังไม่แม่น ({due} ข้อ)
                    </button>
                  );
                })()}
                {/* คลังข้อสอบ: passages saved from previous generations (never lost) */}
                {(() => {
                  // hide legacy/empty entries (no passage text or no questions) — they can't be replayed
                  const passages = Object.values(st.data || {})
                    .filter(p => p && p.transcript && (p.questions || []).length > 0)
                    .sort((a, b) => (b.gen || 0) - (a.gen || 0));
                  if (!passages.length) return null;
                  return (
                    <div style={{ marginTop: 4 }}>
                      <div style={{ fontSize: 12.5, color: C.sub, fontWeight: 600, marginBottom: 8 }}>
                        📚 คลังข้อสอบที่เคยสร้าง ({passages.length} ชุด) — แตะเพื่อทำซ้ำ
                      </div>
                      <div style={{ display: "grid", gap: 8 }}>
                        {passages.map(p => {
                          const preview = (p.transcript || "").replace(/\n/g, " ").slice(0, 70);
                          const nq = (p.questions || []).length;
                          let ok = 0; for (const q of (p.questions || [])) if (st.ratings[q.id] === "known") ok++;
                          return (
                            <div key={p.id} style={{ display: "flex", alignItems: "stretch", gap: 8, background: C.panel, border: `1px solid ${C.line}`, borderRadius: 11, overflow: "hidden" }}>
                              <button onClick={() => playSavedReading(p.id)}
                                style={{ flex: 1, textAlign: "left", background: "none", border: "none", padding: "11px 13px", cursor: "pointer", minWidth: 0 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 4 }}>
                                  <span style={{ fontSize: 12, color: C.accent, fontWeight: 600 }}>{p.ptype || "Part 7"} · {nq} ข้อ{ok > 0 ? ` · เข้าใจ ${ok}/${nq}` : ""}</span>
                                  {p.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>{p.model}</span> : null}
                                </div>
                                <div style={{ fontSize: 13, color: C.ink, lineHeight: 1.45 }}>{preview}…</div>
                              </button>
                              <ConfirmBtn onConfirm={() => deleteSavedReading(p.id)} idleLabel="🗑" confirmLabel="ลบ?"
                                style={{ flex: "0 0 auto", alignSelf: "center", marginRight: 8, padding: "8px 10px", fontSize: 13, borderRadius: 9 }} />
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            );
          }
          const done = v.pos >= v.deck.length;
          if (done && !v.end) { v.end = Date.now(); }
          if (!done) {
            const item = v.deck[v.pos];
            const tx = v.transcript || item.transcript;
            const picked = v.picked[item.id];
            const revealed = !!picked;
            return (
              <div className="rise" key={v.pos}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, color: C.sub, marginBottom: 8 }}>

                  <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                    {v.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>จาก {v.model}</span> : null}
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 5, background: C.accentSoft, color: C.accent,
                      fontWeight: 700, fontSize: 14, padding: "4px 11px", borderRadius: 20, fontVariantNumeric: "tabular-nums" }}>⏱ {fmtTime((v.end || now) - v.start)}</span>
                  </span>
                </div>
                <Progress pos={v.pos} len={v.deck.length} />
                {tx && (
                  <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 12, padding: "13px 15px", marginBottom: 12 }}>
                    <div style={{ fontSize: 10.5, letterSpacing: 1, textTransform: "uppercase", color: C.accent, fontWeight: 600, marginBottom: 6 }}>Passage (เนื้อเรื่องสำหรับอ่าน)</div>
                    <div style={{ fontSize: 14.5, color: C.ink, lineHeight: 1.7, whiteSpace: "pre-line" }}>{tx}</div>
                  </div>
                )}
                <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "18px 16px", boxShadow: "0 10px 30px -18px rgba(40,30,20,.4)" }}>
                  <div style={{ fontSize: 15.5, lineHeight: 1.5, fontWeight: 600, marginBottom: 14 }}>{item.q}</div>
                  <div style={{ display: "grid", gap: 9 }}>
                    {["A", "B", "C", "D"].map(k => {
                      if (!item.options[k]) return null;
                      const isAns = k === item.answer; const isPicked = k === picked;
                      let bg = "#fff", bd = C.line, fg = C.ink;
                      if (revealed) { if (isAns) { bg = C.greenBg; bd = C.green; } else if (isPicked) { bg = C.redBg; bd = C.red; } }
                      return (
                        <button key={k} className="opt" onClick={() => { chooseLQ(item.id, k); }} disabled={revealed}
                          style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "center", background: bg, border: `1.5px solid ${bd}`, color: fg, borderRadius: 11, padding: "12px 14px", fontSize: 15, lineHeight: 1.4 }}>
                          <span style={{ flex: "0 0 auto", width: 26, height: 26, borderRadius: 7,
                            background: revealed && isAns ? C.green : revealed && isPicked ? C.red : C.accentSoft,
                            color: revealed && (isAns || isPicked) ? "#fff" : C.accent, fontWeight: 700, fontSize: 13, display: "grid", placeItems: "center" }}>{k}</span>
                          <span>{item.options[k]}</span>
                          {revealed && isAns && <span style={{ marginLeft: "auto", color: C.green }}>✓</span>}
                          {revealed && isPicked && !isAns && <span style={{ marginLeft: "auto", color: C.red }}>✕</span>}
                        </button>
                      );
                    })}
                  </div>
                  {revealed && (
                    <div className="rise" style={{ marginTop: 14 }}>
                      <div style={{ fontWeight: 600, color: picked === item.answer ? C.green : C.red, marginBottom: 10 }}>
                        {picked === item.answer ? "ถูกต้อง! 🎉" : `ยังไม่ใช่ — คำตอบคือ ${item.answer}`}
                      </div>
                      <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 14px", fontSize: 14, lineHeight: 1.65, marginBottom: 12 }}>
                        <b style={{ color: C.accent }}>อธิบาย:</b> {item.explain}
                      </div>
                      {/* rating — same model as Grammar/Vocab; keyed by the question's stable bank id */}
                      <RatingRow mode="listening" current={st.ratings[item.id]} onRate={s => rateReading(item.id, s)} small />
                      <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", marginTop: 12 }}>
                        <button onClick={nextLQ}
                          style={{ background: C.accent, color: "#fff", border: "none", borderRadius: 10, padding: "10px 18px", fontSize: 15, fontWeight: 700, boxShadow: "0 6px 16px -8px rgba(191,77,40,.8)" }}>
                          {v.pos + 1 >= v.deck.length ? "จบ" : "→"}
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          }
          // summary
          let correct = 0; v.deck.forEach(it => { if (v.picked[it.id] === it.answer) correct++; });
          const n = v.deck.length; const totalMs = (v.end || now) - v.start; const pct = Math.round((correct / n) * 100);
          return (
            <div className="rise" style={{ textAlign: "center", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "26px 18px" }}>

              </div>
              <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>ถูก {pct}%</div>
              <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap", margin: "16px 0 4px" }}>
                <Stat label="ถูก" value={correct} color={C.green} bg={C.greenBg} />
                <Stat label="ผิด" value={n - correct} color={C.red} bg={C.redBg} />
                <Stat label="เวลารวม" value={fmtTime(totalMs)} color={C.ink} bg="#efe7d7" />
              </div>
              {correct < n
                ? <div style={{ margin: "14px auto 0", maxWidth: 420, fontSize: 13, color: C.red, fontWeight: 600 }}>ข้อที่พลาดถูกเก็บเข้าคลังทวนแล้ว ✓</div>
                : <div style={{ margin: "14px auto 0", fontSize: 13.5, color: C.green, fontWeight: 600 }}>ถูกหมดเลย! 🌟</div>}
              <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                <button onClick={genPractice} disabled={st.generating}
                  style={{ flex: 1, background: C.accent, color: "#fff", border: "none", borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>ชุดใหม่</button>
                <button onClick={() => setLquiz(null)}
                  style={{ flex: 1, background: "#fff", color: C.sub, border: `1.5px solid ${C.line}`, borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 600 }}>ออก</button>
              </div>
            </div>
          );
        })()}

        {/* ===== DRILL / VOCAB AREA (gen, stats, tabs, cards) ===== */}
        {!(mode === "grammar" && gSection === "lesson") && !(mode === "vocab" && vSection === "quiz") && mode !== "listening" && (
          <>
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12, fontSize: 13, color: C.sub }}>
          <span>สร้างไปแล้ว <b style={{ color: C.accent, fontSize: 15 }}>{Math.ceil((total || 0) / (BATCH[mode] || 5))}</b> ชุด</span>
          <span style={{ color: C.line }}>•</span>

        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
          <span style={{ fontSize: 12.5, color: C.sub, flex: "0 0 auto" }}>รุ่น AI:</span>
          <div style={{ display: "flex", flex: 1, background: "#efe7d7", borderRadius: 10, padding: 3, gap: 3 }}>
            {MODELS.map(mm => {
              const on = models[mode] === mm.id;
              const rec = RECOMMENDED[mode] === mm.id;
              return (
                <button key={mm.id} onClick={() => chooseModel(mm.id)} disabled={st.generating}
                  style={{ position: "relative", flex: 1, border: "none", borderRadius: 8, padding: "7px 4px", fontSize: 12, fontWeight: 600, lineHeight: 1.25,
                    background: on ? "#fffdf8" : "transparent", color: on ? C.ink : "#8a7f70",
                    boxShadow: on ? "0 2px 6px -3px rgba(40,30,20,.5)" : "none" }}>
                  {mm.label}<br /><span style={{ fontSize: 10, fontWeight: 400, opacity: .75 }}>{rec ? "★ แนะนำ" : mm.note}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* generate */}
        <button onClick={generate} disabled={st.generating}
          style={{ width: "100%", background: st.generating ? "#d9a892" : C.accent, color: "#fff", border: "none", borderRadius: 13,
            padding: "14px 18px", fontSize: 15.5, fontWeight: 600, boxShadow: "0 8px 20px -10px rgba(191,77,40,.9)",
            display: "flex", alignItems: "center", justifyContent: "center", gap: 9, marginBottom: 10 }}>
          {st.generating ? (
            <><span className="spin" style={{ width: 16, height: 16, border: "2px solid #fff", borderTopColor: "transparent", borderRadius: "50%", display: "inline-block" }} /> กำลังสร้าง{mode === "vocab" ? "คำ" : "ข้อ"}ใหม่…</>
          ) : (
            <>✨ สุ่ม{mode === "vocab" ? "คำ" : "ข้อ"}ชุดใหม่ ({BATCH[mode]} {mode === "vocab" ? "คำ" : "ข้อ"})</>
          )}
        </button>
        {reviewable > 0 && !st.generating && (
          <button onClick={buildReviewDeck}
            style={{ width: "100%", background: C.amberBg, color: C.ink, border: `1.5px solid ${C.amber}`, borderRadius: 13, padding: "13px",
              fontSize: 14.5, fontWeight: 700, marginBottom: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            🔁 ทวน{mode === "vocab" ? "คำ" : "ข้อ"}ที่ยังไม่แม่น ({reviewable} {mode === "vocab" ? "คำ" : "ข้อ"})
          </button>
        )}
        {st.genErr && <div style={{ color: C.red, fontSize: 12.5, marginBottom: 10, lineHeight: 1.5, wordBreak: "break-word", background: C.redBg, border: `1px solid ${C.red}`, borderRadius: 9, padding: "8px 10px" }}>{st.genErr}</div>}
        {st.lastAdded != null && !st.generating && (
          <div style={{ color: C.green, fontSize: 13, marginBottom: 10 }}>
            เพิ่ม{mode === "vocab" ? "คำ" : "ข้อ"}ใหม่ {st.lastAdded} {mode === "vocab" ? "คำ" : "ข้อ"}เรียบร้อย ✓
            {st.lastCategory ? <span style={{ color: C.sub }}> · หมวด: {st.lastCategory}</span> : null}
          </div>

          <Pill bg={S.sort.bg} fg={S.sort.color} label={`${S.sort.short} ${counts.sort}`} />
          <Pill bg={S.known.bg} fg={S.known.color} label={`${S.known.short} ${counts.known}`} />

        <div style={{ display: "inline-flex", background: "#efe7d7", borderRadius: 11, padding: 3, gap: 3, marginBottom: 16 }}>

        {!storageOk && <div style={{ fontSize: 12, color: C.amber, marginBottom: 12, lineHeight: 1.5 }}>* ที่เปิดอยู่นี้บันทึกข้ามรอบอัตโนมัติไม่ได้ — กด "สำรอง/กู้คืน" มุมขวาบนเพื่อเก็บข้อมูลเองก่อนปิดนะครับ</div>}

              : "เด็คว่างอยู่ — กด ✨ สร้างใหม่ หรือ 🔁 ทวนของเก่า"}
          </Centered>

        {/* ===== VOCAB STUDY ===== */}
        {loaded && mode === "vocab" && st.tab === "study" && !emptyStudy && !sessionDone && card && (
          <div className="rise" key={st.pos}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, color: C.sub, marginBottom: 8 }}>
              <span>การ์ด {st.pos + 1}/{st.deck.length}</span>
              <StatusBadge mode={mode} status={st.ratings[card.w]} />
            </div>
            <Progress pos={st.pos} len={st.deck.length} />
            <div className="flip" onClick={setFlip} style={{ cursor: "pointer", marginBottom: 16 }}>
              <div className={"flip-inner" + (st.flipped ? " is-flipped" : "")} style={{ minHeight: 230 }}>
                <div className="face" style={faceStyle()}>
                  <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: C.accent, fontWeight: 600 }}>คำศัพท์</div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 38, lineHeight: 1.1, margin: "14px 0 8px", textAlign: "center" }}>{card.w}</div>
                  <div style={{ color: C.sub, fontSize: 16 }}>{card.ipa}</div>
                  <div style={{ color: C.sub, fontSize: 13, marginTop: 4 }}>{card.pos}</div>
                  <div style={{ marginTop: 18, fontSize: 12.5, color: C.sub }}>แตะเพื่อดูคำใบ้ (นิยาม + ประโยค) ↻</div>
                </div>
                <div className="face back" style={faceStyle()}>
                  <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 22, marginBottom: 8 }}>{card.w}</div>
                  {revealTh ? (
                    <div style={{ fontSize: 19, fontWeight: 600, color: C.accent, marginBottom: 10, textAlign: "center" }}>{card.th}</div>
                  ) : (
                    <button onClick={(e) => { e.stopPropagation(); setRevealTh(true); }}
                      style={{ marginBottom: 10, border: `1.5px dashed ${C.accent}`, background: C.accentSoft, color: C.accent,
                        borderRadius: 10, padding: "7px 16px", fontSize: 13.5, fontWeight: 600 }}>
                      👁 แตะเพื่อดูคำแปล (ลองเดาจากด้านล่างก่อน)
                    </button>
                  )}
                  <div style={{ fontSize: 14, color: C.ink, lineHeight: 1.5, textAlign: "center" }}>{card.def}</div>
                  <div style={{ marginTop: 12, fontSize: 14, color: C.sub, fontStyle: "italic", lineHeight: 1.5, textAlign: "center" }}>“{card.ex}”</div>
                </div>
              </div>
            </div>
            <RatingRow mode={mode} current={st.ratings[card.w]} onRate={s => rate(card.w, s, true)} big />
            <NavRow pos={st.pos} len={st.deck.length} onPrev={() => setPos(p => Math.max(p - 1, 0))} onNext={() => setPos(p => Math.min(p + 1, st.deck.length))} />
          </div>
        )}

        {/* ===== GRAMMAR STUDY ===== */}
        {loaded && mode === "grammar" && st.tab === "study" && !emptyStudy && !sessionDone && card && (
          <div className="rise" key={card.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 13, color: C.sub, marginBottom: 8 }}>
              <span>ข้อ {st.pos + 1}/{st.deck.length}</span>
              <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 5, background: C.accentSoft, color: C.accent,
                  fontWeight: 700, fontSize: 14, padding: "4px 11px", borderRadius: 20, fontVariantNumeric: "tabular-nums" }}>
                  ⏱ {fmtTime((st.endTime || now) - (st.startTime || now))}
                </span>
                <StatusBadge mode={mode} status={st.ratings[card.id]} />
              </span>
            </div>
            <Progress pos={st.pos} len={st.deck.length} />
            <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "20px 18px", boxShadow: "0 10px 30px -18px rgba(40,30,20,.4)" }}>
              {card.point && (
                <div style={{ fontSize: 11, letterSpacing: 1, textTransform: "uppercase", color: C.accent, fontWeight: 600, marginBottom: 10 }}>Part 5 · {card.point}</div>
              )}
              <div style={{ fontSize: 17.5, lineHeight: 1.55, fontWeight: 500, marginBottom: 16 }}>{card.q}</div>
              <div style={{ display: "grid", gap: 9 }}>
                {["A", "B", "C", "D"].map(k => {
                  if (!card.options[k]) return null;
                  const isAns = k === card.answer;
                  const isPicked = k === picked;
                  let bg = "#fff", bd = C.line, fg = C.ink;
                  if (revealed) { if (isAns) { bg = C.greenBg; bd = C.green; } else if (isPicked) { bg = C.redBg; bd = C.red; } }
                  return (
                    <button key={k} className="opt" onClick={() => choose(card.id, k)} disabled={revealed}
                      style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "center", background: bg, border: `1.5px solid ${bd}`, color: fg, borderRadius: 11, padding: "12px 14px", fontSize: 15.5, lineHeight: 1.4 }}>
                      <span style={{ flex: "0 0 auto", width: 26, height: 26, borderRadius: 7,
                        background: revealed && isAns ? C.green : revealed && isPicked ? C.red : C.accentSoft,
                        color: revealed && (isAns || isPicked) ? "#fff" : C.accent, fontWeight: 700, fontSize: 13, display: "grid", placeItems: "center" }}>{k}</span>
                      <span>{card.options[k]}</span>
                      {revealed && isAns && <span style={{ marginLeft: "auto", color: C.green }}>✓</span>}
                      {revealed && isPicked && !isAns && <span style={{ marginLeft: "auto", color: C.red }}>✕</span>}
                    </button>
                  );
                })}
              </div>
              {revealed && (
                <div className="rise" style={{ marginTop: 16 }}>
                  <div style={{ fontWeight: 600, color: picked === card.answer ? C.green : C.red, marginBottom: 10 }}>
                    {picked === card.answer ? "ถูกต้อง! 🎉" : `ยังไม่ใช่ — คำตอบคือ ${card.answer}`}
                  </div>

                  {/* action row: rating + next in one line, above explanation (tap fast, read later) */}
                  <div style={{ display: "flex", gap: 6, alignItems: "stretch", marginBottom: 14 }}>
                    {[["forgot", "ไม่เข้าใจ"], ["sort", "พอเข้าใจ"], ["known", "เข้าใจ"]].map(([s, lbl]) => {
                      const on = st.ratings[card.id] === s;
                      const SS = STATUS.grammar[s];
                      return (
                        <button key={s} onClick={() => rate(card.id, s, false)}
                          style={{ flex: 1, border: `1.5px solid ${on ? SS.color : C.line}`, background: on ? SS.bg : "#fff",
                            color: on ? SS.color : C.ink, borderRadius: 10, padding: "11px 4px", fontSize: 12.5, fontWeight: 600, lineHeight: 1.2 }}>
                          {lbl}
                        </button>
                      );
                    })}
                    <button onClick={() => setPos(p => Math.min(p + 1, st.deck.length))}
                      style={{ flex: "0 0 auto", minWidth: 58, background: C.accent, color: "#fff", border: "none", borderRadius: 10,
                        padding: "11px 14px", fontSize: 17, fontWeight: 700, boxShadow: "0 6px 16px -8px rgba(191,77,40,.8)" }}>
                      {st.pos + 1 >= st.deck.length ? "จบ" : "→"}
                    </button>
                  </div>

                  <div style={{ background: "#fbf6ec", border: `1px solid ${C.line}`, borderRadius: 10, padding: "12px 14px", fontSize: 14.5, lineHeight: 1.65 }}>
                    <b style={{ color: C.accent }}>อธิบาย:</b> {card.explain}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* SESSION DONE */}
        {loaded && st.tab === "study" && sessionDone && (() => {
          // grammar scoring
          let correct = 0, answered = 0, totalMs = 0, n = st.deck.length;
          if (mode === "grammar") {
            st.deck.forEach(c => {
              const p = st.pickedMap[c.id];
              if (p) { answered++; if (p === c.answer) correct++; }
            });
            totalMs = (st.endTime || now) - st.startTime;
          }
          const wrong = answered - correct;
          const avg = answered ? totalMs / answered : 0;
          const pct = n ? Math.round((correct / n) * 100) : 0;
          return (
            <div className="rise" style={{ textAlign: "center", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "28px 18px" }}>
              <div style={{ fontSize: 40 }}>🎉</div>
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 24, fontWeight: 600, margin: "8px 0" }}>จบรอบนี้แล้ว!</div>

              {mode === "grammar" && (
                <>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 46, fontWeight: 700, lineHeight: 1, color: C.accent, marginTop: 6 }}>
                    {correct}<span style={{ fontSize: 24, color: C.sub }}>/{n}</span>
                  </div>
                  <div style={{ fontSize: 13, color: C.sub, marginTop: 2 }}>ถูก {pct}%</div>

                  <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap", margin: "16px 0 4px" }}>
                    <Stat label="ถูก" value={correct} color={C.green} bg={C.greenBg} />
                    <Stat label="ผิด" value={wrong} color={C.red} bg={C.redBg} />
                    <Stat label="เวลารวม" value={fmtTime(totalMs)} color={C.ink} bg="#efe7d7" />
                    <Stat label="เฉลี่ย/ข้อ" value={`${(avg / 1000).toFixed(1)}s`} color={C.ink} bg="#efe7d7" />
                  </div>
                  <div style={{ fontSize: 12.5, color: C.sub, maxWidth: 360, margin: "10px auto 0", lineHeight: 1.6 }}>
                    เป้าความเร็ว Part 5 จริง ≈ <b>20–30 วินาที/ข้อ</b> · ตอบไป {answered}/{n} ข้อ
                  </div>
                </>
              )}

              <div style={{ color: C.sub, fontSize: 14, lineHeight: 1.6, maxWidth: 380, margin: "16px auto 0" }}>
                สถานะบันทึกไว้แล้ว · กด ✨ ด้านบนเพื่อสร้างชุดใหม่ หรือ 🔁 ทวนของที่ยังไม่แม่น
              </div>
            </div>
          );
        })()}

        {/* BANK */}
        {loaded && st.tab === "bank" && (
          <div className="rise">
            {total === 0 ? (
              <Centered>ยังไม่มีของในคลัง — กด ✨ สร้างชุดแรกก่อนนะครับ</Centered>
            ) : (
              <>
                {mode === "vocab" && reviewable > 0 && (
                  <button onClick={copyUnmasteredVocab}
                    style={{ width: "100%", background: "#fff", color: C.accent, border: `1.5px solid ${C.accentSoft}`, borderRadius: 12, padding: "11px", fontSize: 13.5, fontWeight: 600, marginBottom: 12 }}>
                    📋 ก๊อปคำที่ยังไม่แม่นไปถาม Coach ({reviewable} คำ)
                  </button>
                )}
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                  {[["all", "ทั้งหมด"], ["new", "ใหม่"], ["forgot", S.forgot.short], ["sort", S.sort.short], ["known", S.known.short]].map(([id, lbl]) => (
                    <button key={id} onClick={() => setBankFilter(id)}
                      style={{ border: `1px solid ${st.bankFilter === id ? C.accent : C.line}`, background: st.bankFilter === id ? C.accentSoft : "#fff",
                        color: st.bankFilter === id ? C.accent : C.sub, borderRadius: 20, padding: "6px 13px", fontSize: 12.5, fontWeight: 600 }}>{lbl}</button>
                  ))}
                </div>
                <div style={{ display: "grid", gap: 10 }}>
                  {Object.values(st.data).filter(x => { const s = st.ratings[idOf(x)] || "new"; return st.bankFilter === "all" || s === st.bankFilter; })
                    .sort((a, b) => (b.gen || 0) - (a.gen || 0))
                    .map(x => mode === "vocab" ? (
                      <div key={x.w} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: "13px 14px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                          <div>
                            <span style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 18 }}>{x.w}</span>
                            <span style={{ color: C.sub, fontSize: 13, marginLeft: 8 }}>{x.ipa}</span>
                          </div>
                          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                            {x.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "1px 6px", borderRadius: 10 }}>{x.model}</span> : null}
                            {x.gen ? <span style={{ fontSize: 11, color: C.sub }}>ชุด {x.gen}</span> : null}
                            <StatusBadge mode={mode} status={st.ratings[x.w]} />
                          </div>
                        </div>
                        <div style={{ fontSize: 14.5, color: C.accent, fontWeight: 600, marginTop: 3 }}>{x.th}</div>
                        <div style={{ fontSize: 13.5, color: C.sub, marginTop: 2, lineHeight: 1.45 }}>{x.def}</div>
                        <RatingRow mode={mode} current={st.ratings[x.w]} onRate={s => rate(x.w, s, false)} small />
                      </div>
                    ) : (
                      <div key={x.id} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: "13px 14px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, marginBottom: 6 }}>
                          <span style={{ fontSize: 11, color: C.accent, fontWeight: 600, textTransform: "uppercase", letterSpacing: .5 }}>{x.point || "Part 5"}</span>
                          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                            {x.model ? <span style={{ fontSize: 10, color: C.accent, background: C.accentSoft, padding: "1px 6px", borderRadius: 10 }}>{x.model}</span> : null}
                            {x.gen ? <span style={{ fontSize: 11, color: C.sub }}>ชุด {x.gen}</span> : null}
                            <StatusBadge mode={mode} status={st.ratings[x.id]} />
                          </div>
                        </div>
                        <div style={{ fontSize: 15, lineHeight: 1.5, fontWeight: 500 }}>{x.q}</div>
                        <div style={{ fontSize: 13.5, color: C.green, fontWeight: 600, marginTop: 6 }}>เฉลย: {x.answer}. {x.options?.[x.answer]}</div>
                        <div style={{ fontSize: 13, color: C.sub, marginTop: 3, lineHeight: 1.5 }}>{x.explain}</div>
                        <button onClick={() => copyGrammarItem(x)}
                          style={{ marginTop: 8, background: "#fff", color: C.accent, border: `1.5px solid ${C.accentSoft}`, borderRadius: 9, padding: "7px 12px", fontSize: 12.5, fontWeight: 600 }}>
                          📋 ก๊อปข้อนี้ไปถาม Coach
                        </button>
                        <RatingRow mode={mode} current={st.ratings[x.id]} onRate={s => rate(x.id, s, false)} small />
                      </div>
                    ))}
                </div>
              </>
            )}
          </div>
        )}
        </>
        )}

        <p style={{ textAlign: "center", color: C.sub, fontSize: 12, marginTop: 22, lineHeight: 1.6 }}>
          {mode === "vocab"
            ? `คำสร้างโดย AI (${(MODELS.find(x => x.id === models[mode]) || MODELS[0]).label}) · ฟังเสียงจริงที่ YouGlish หรือ dictionary`
            : mode === "listening"
            ? `บทเรียน/ข้อฝึกสร้างโดย AI (${(MODELS.find(x => x.id === models[mode]) || MODELS[0]).label}) · Strategy ครอบคลุมทั้ง Listening + Reading · ฝึกฟังเสียงจริงเสริมที่ YouTube ("TOEIC Listening Practice Test full")`
            : `ข้อสอบสร้างโดย AI (${(MODELS.find(x => x.id === models[mode]) || MODELS[0]).label}) เพื่อฝึกซ้อม`}
          {" "}· สถานะบันทึกอัตโนมัติ แยกของแต่ละโหมด
        </p>
      </div>
    </div>
  );
}

function Progress({ pos, len }) {
  return (
    <div style={{ height: 5, borderRadius: 3, background: C.line, marginBottom: 16, overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${(pos / len) * 100}%`, background: C.accent, transition: "width .3s" }} />
    </div>
  );
}
function RatingRow({ mode, current, onRate, big, small }) {
  const S = STATUS[mode];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: small ? 6 : 8, marginTop: small ? 10 : 0 }}>
      {["forgot", "sort", "known"].map(s => {
        const on = current === s;
        return (
          <button key={s} onClick={() => onRate(s)}
            style={{ border: `1.5px solid ${on ? S[s].color : C.line}`, background: on ? S[s].bg : "#fff",
              color: on ? S[s].color : (small ? C.sub : C.ink), borderRadius: small ? 9 : 11,
              padding: small ? "8px 4px" : (big ? "11px 6px" : "10px 6px"), fontSize: small ? 12.5 : 13.5, fontWeight: 600 }}>
            {small ? S[s].short : S[s].label}
          </button>
        );
      })}
    </div>
  );
}
function NavRow({ pos, len, onPrev, onNext }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", marginTop: 14 }}>
      <button onClick={onPrev} disabled={pos === 0} style={{ background: "none", border: "none", color: pos === 0 ? C.line : C.sub, fontSize: 14 }}>← ก่อนหน้า</button>
      <button onClick={onNext} style={{ background: "none", border: "none", color: C.sub, fontSize: 14 }}>ข้าม →</button>
    </div>
  );
}
function faceStyle() {
  return { background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16,
    boxShadow: "0 10px 30px -18px rgba(40,30,20,.4)", padding: "26px 18px",
    minHeight: 230, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" };
}
function StatusBadge({ mode, status }) {
  const S = STATUS[mode];
  const m = status ? S[status] : NEW_META;
  return <span style={{ background: m.bg, color: m.color, fontSize: 11.5, fontWeight: 600, padding: "3px 9px", borderRadius: 20, whiteSpace: "nowrap" }}>{status ? S[status].short : "ใหม่"}</span>;
}
function Pill({ bg, fg, label }) {
  return <span style={{ background: bg, color: fg, fontSize: 12.5, fontWeight: 600, padding: "5px 11px", borderRadius: 20 }}>{label}</span>;
}
function Stat({ label, value, color, bg }) {
  return (
    <div style={{ background: bg, borderRadius: 11, padding: "10px 14px", minWidth: 72 }}>
      <div style={{ fontSize: 19, fontWeight: 700, color, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>{value}</div>
      <div style={{ fontSize: 11.5, color: C.sub, marginTop: 2 }}>{label}</div>
    </div>
  );
}
function Centered({ children }) {
  return <div style={{ display: "grid", placeItems: "center", textAlign: "center", minHeight: 200, color: C.sub, padding: 20, lineHeight: 1.6 }}>{children}</div>;
}

// tap-once shows "แน่ใจ? ลบเลย"; tap-again confirms. auto-reverts after 3s so a stray tap is harmless.
function ConfirmBtn({ onConfirm, idleLabel, confirmLabel, style }) {
  const [armed, setArmed] = React.useState(false);
  React.useEffect(() => {
    if (!armed) return;
    const t = setTimeout(() => setArmed(false), 3000);
    return () => clearTimeout(t);
  }, [armed]);
  const base = { borderRadius: 8, padding: "5px 11px", fontSize: 12.5, fontWeight: 600, border: "1px solid", whiteSpace: "nowrap" };
  return (
    <button
      onClick={(e) => { e.stopPropagation(); if (armed) { setArmed(false); onConfirm(); } else { setArmed(true); } }}
      style={{ ...base,
        background: armed ? C.red : C.greenBg, color: armed ? "#fff" : C.green,
        borderColor: armed ? C.red : C.green, ...(style || {}) }}>
      {armed ? (confirmLabel || "แน่ใจ? ลบเลย") : (idleLabel || "✓ จำได้แล้ว")}
    </button>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
